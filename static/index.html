<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIManagePlatform - 总控制台</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-gradient: linear-gradient(140deg, #0b0822 0%, #1c1648 48%, #121030 100%);
  --glass-bg: rgba(255, 255, 255, 0.05);
  --glass-border: rgba(255, 255, 255, 0.09);
  --primary-gradient: linear-gradient(120deg, #72e0e0, #ffc8dd);
  --text-main: #f4f4f7;
  --text-sub: #a9a9b8;
  --accent-cyan: #87e8e8;
  --accent-pink: #ffc8dd;
  --danger: #ff6b6b;
}
body {
  font-family: "Segoe UI", PingFang SC, Microsoft YaHei, system-ui, sans-serif;
  background: var(--bg-gradient);
  min-height: 100vh;
  color: var(--text-main);
  padding: 16px;
}
.top-nav {
  max-width: 1500px;
  margin: 0 auto 32px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 24px;
  border-radius: 16px;
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  backdrop-filter: blur(24px);
  flex-wrap: wrap;
  gap: 16px;
}
.nav-title {
  display: flex;
  align-items: center;
  gap: 12px;
}
.nav-title h1 {
  font-size: 24px;
  background: var(--primary-gradient);
  -webkit-background-clip: text;
  color: transparent;
}
.nav-tag {
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 6px;
  background: rgba(114, 224, 224, 0.12);
  color: var(--accent-cyan);
}
.nav-config {
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}
.config-item {
  display: flex;
  align-items: center;
  gap: 8px;
}
.config-label {
  font-size: 13px;
  color: var(--text-sub);
}
.config-input {
  background: rgba(0,0,0,0.25);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px;
  padding: 8px 12px;
  color: #fff;
  font-size: 13px;
  font-family: "Consolas", monospace;
  outline: none;
  transition: all 0.2s;
  min-width: 200px;
}
.config-input:focus {
  border-color: var(--accent-cyan);
  box-shadow: 0 0 0 2px rgba(114, 224, 224, 0.12);
}
.config-input.error {
  border-color: var(--danger);
  box-shadow: 0 0 0 2px rgba(255, 107, 107, 0.1);
}
.config-input.success {
  border-color: rgba(74, 222, 128, 0.4);
}
.wrapper {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: calc(100vh - 120px);
}
.hero-section {
  text-align: center;
  margin-bottom: 40px;
}
.hero-section h2 {
  font-size: 36px;
  margin-bottom: 16px;
  background: var(--primary-gradient);
  -webkit-background-clip: text;
  color: transparent;
}
.hero-section p {
  font-size: 16px;
  color: var(--text-sub);
  max-width: 600px;
  line-height: 1.8;
}
.cards-container {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 24px;
  width: 100%;
  max-width: 800px;
}
.card {
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: 24px;
  backdrop-filter: blur(24px);
  padding: 32px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: var(--primary-gradient);
  opacity: 0;
  transition: opacity 0.3s ease;
  z-index: 0;
}
.card:hover {
  transform: translateY(-8px);
  box-shadow: 0 20px 60px rgba(114, 224, 224, 0.15);
  border-color: rgba(114, 224, 224, 0.3);
}
.card:hover::before {
  opacity: 0.05;
}
.card-icon {
  width: 64px;
  height: 64px;
  margin: 0 auto 20px;
  border-radius: 16px;
  background: rgba(114, 224, 224, 0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  position: relative;
  z-index: 1;
}
.card:nth-child(2) .card-icon {
  background: rgba(255, 200, 221, 0.1);
}
.card:nth-child(3) .card-icon {
  background: rgba(130, 210, 130, 0.1);
}
.card h3 {
  font-size: 20px;
  margin-bottom: 12px;
  position: relative;
  z-index: 1;
}
.card p {
  font-size: 14px;
  color: var(--text-sub);
  line-height: 1.6;
  position: relative;
  z-index: 1;
}
.card-arrow {
  position: relative;
  z-index: 1;
  margin-top: 20px;
  font-size: 20px;
  color: var(--accent-cyan);
  opacity: 0;
  transform: translateX(-10px);
  transition: all 0.3s ease;
}
.card:hover .card-arrow {
  opacity: 1;
  transform: translateX(0);
}
.card:hover h3 {
  color: var(--accent-cyan);
}
.card:nth-child(2):hover h3 {
  color: var(--accent-pink);
}
.card:nth-child(2) .card-arrow {
  color: var(--accent-pink);
}
.card:nth-child(3):hover h3 {
  color: #82d282;
}
.card:nth-child(3) .card-arrow {
  color: #82d282;
}
.footer-info {
  margin-top: 60px;
  text-align: center;
  font-size: 12px;
  color: var(--text-sub);
  opacity: 0.6;
}
.footer-info span {
  margin: 0 12px;
}
@media(max-width: 768px) {
  .cards-container {
    grid-template-columns: 1fr;
  }
  .hero-section h2 {
    font-size: 28px;
  }
}
</style>
</head>
<body>
<div class="top-nav">
  <div class="nav-title">
    <h1>AIManagePlatform</h1>
    <span class="nav-tag">总控制台</span>
  </div>
  <div class="nav-config">
    <div class="config-item">
      <span class="config-label">🔑 API Key <span style="color: var(--danger);">*</span></span>
      <input type="text" class="config-input" id="apiKeyInput" placeholder="sk-xxxxxxxxxxxxxxxxxxxxxxxxxx" onkeyup="validateKey()">
    </div>
    <div class="config-item">
      <span class="config-label">🌐 API 地址</span>
      <input type="text" class="config-input" id="apiUrlInput" placeholder="https://open.bigmodel.cn/api/paas/v4/chat/completions" onkeyup="validateUrl()">
    </div>
  </div>
</div>

<div class="wrapper">
  <div class="hero-section">
    <h2>AI 管理平台</h2>
    <p>选择您需要的功能模块，开始使用 AI 服务</p>
  </div>

  <div class="cards-container">
    <div class="card" onclick="navigateTo('/chat')">
      <div class="card-icon">🤖</div>
      <h3>AI 推理对话</h3>
      <p>与 AI 模型进行实时对话，支持 MCP 工具调用（时间查询、数学计算、文件读取），体验流式响应效果</p>
      <div class="card-arrow">→</div>
    </div>

    <div class="card" onclick="navigateTo('/keys')">
      <div class="card-icon">🔑</div>
      <h3>API Key 管理</h3>
      <p>生成、查看、删除 API 密钥，管理访问凭证，支持导出和复制操作</p>
      <div class="card-arrow">→</div>
    </div>

    <div class="card" onclick="navigateTo('/devices')">
      <div class="card-icon">📱</div>
      <h3>硬件设备管理</h3>
      <p>管理 ESP32 等硬件设备的设备码，分配管理员 API Key，支持设备使用记录查询</p>
      <div class="card-arrow">→</div>
    </div>
  </div>

  <div class="footer-info">
    <span>MCP 协议 · JSON-RPC 2.0</span>
    <span>|</span>
    <span>OpenAI 兼容 API</span>
  </div>
</div>

<script>
const API_KEY_STORAGE = 'ai_platform_api_key';
const API_URL_STORAGE = 'ai_platform_api_url';
const DEFAULT_API_URL = 'https://open.bigmodel.cn/api/paas/v4/chat/completions';

function getStoredKey() {
  return localStorage.getItem(API_KEY_STORAGE) || '';
}

function getStoredUrl() {
  return localStorage.getItem(API_URL_STORAGE) || DEFAULT_API_URL;
}

function saveKey(apiKey) {
  localStorage.setItem(API_KEY_STORAGE, apiKey);
}

function saveUrl(apiUrl) {
  localStorage.setItem(API_URL_STORAGE, apiUrl);
}

function validateKey() {
  const input = document.getElementById('apiKeyInput');
  
  if (input.value.trim()) {
    input.classList.remove('error');
    input.classList.add('success');
    saveKey(input.value.trim());
  } else {
    input.classList.remove('error', 'success');
  }
}

function validateUrl() {
  const input = document.getElementById('apiUrlInput');
  
  if (input.value.trim()) {
    saveUrl(input.value.trim());
  }
}

function navigateTo(path) {
  const apiKey = document.getElementById('apiKeyInput').value.trim();
  
  if (!apiKey) {
    const input = document.getElementById('apiKeyInput');
    input.classList.add('error');
    input.classList.remove('success');
    input.focus();
    return;
  }
  
  saveKey(apiKey);
  
  const apiUrl = document.getElementById('apiUrlInput').value.trim();
  if (apiUrl) {
    saveUrl(apiUrl);
  }
  
  window.location.href = path;
}

document.addEventListener('DOMContentLoaded', function() {
  const storedKey = getStoredKey();
  if (storedKey) {
    document.getElementById('apiKeyInput').value = storedKey;
    validateKey();
  }
  
  const storedUrl = getStoredUrl();
  document.getElementById('apiUrlInput').value = storedUrl;
});

document.getElementById('apiKeyInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    navigateTo('/chat');
  }
});

document.getElementById('apiKeyInput').addEventListener('blur', function() {
  const apiKey = this.value.trim();
  if (apiKey) {
    saveKey(apiKey);
  }
});

document.getElementById('apiUrlInput').addEventListener('blur', function() {
  const apiUrl = this.value.trim();
  if (apiUrl) {
    saveUrl(apiUrl);
  }
});
</script>
</body>
</html>
