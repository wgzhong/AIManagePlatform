<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>多领域服务配置 — AIManagePlatform</title>
<style>
/* ═════════════════════════════════════════
   多领域服务配置 — 浅色卡片网格风格
   ═════════════════════════════════════════ */
:root {
  --bg: #f0f2f5;
  --card-bg: #ffffff;
  --card-border: #e8ecf0;
  --input-bg: #f7f8fa;
  --text: #1a1a2e;
  --text-secondary: #5a6474;
  --text-muted: #9aa4b2;
  --accent: #6366f1;
  --accent-2: #8b5cf6;
  --accent-cyan: #0891b2;
  --danger: #ef4444;
  --success: #10b981;
  --warning: #f59e0b;
  --radius: 14px;
  --radius-sm: 10px;
}
* { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",system-ui,sans-serif;
  background:var(--bg); color:var(--text);
  min-height:100vh; line-height:1.55; font-size:14px;
}
a { color:var(--accent); text-decoration:none; }

/* ── Top Nav ── */
.top-nav {
  position:sticky; top:0; z-index:100;
  background:rgba(255,255,255,.92); backdrop-filter:saturate(180%) blur(12px);
  border-bottom:1px solid var(--card-border);
  padding:0 28px; height:54px; display:flex; align-items:center; gap:14px;
}
.nav-brand { display:flex; align-items:center; gap:9px; text-decoration:none; color:inherit; }
.nav-brand .logo { font-size:17px; font-weight:700; color:var(--text); }
.nav-link { color:var(--text-secondary); text-decoration:none; font-size:13px; padding:6px 14px; border-radius:8px; transition:all .18s; }
.nav-link:hover { background:rgba(99,102,241,.08); color:var(--accent); }

/* ── Page ── */
.page-wrap { max-width:1100px; margin:0 auto; padding:28px 24px 80px; }

/* Header */
.page-header { margin-bottom:20px; }
.page-title { font-size:24px; font-weight:800; color:var(--text); }
.page-title span { background:linear-gradient(135deg,var(--accent), var(--accent-cyan)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.page-desc { color:var(--text-secondary); font-size:13.5px; margin-top:4px; }

/* ═══ 分类标签栏 ═══ */
.cat-tabs { display:flex; gap:6px; margin-bottom:20px; flex-wrap:wrap; }
.cat-tab {
  padding:7px 16px; border-radius:20px; font-size:13px; font-weight:600;
  background:var(--card-bg); border:1.5px solid var(--card-border);
  cursor:pointer; transition:all .2s; display:flex; align-items:center; gap:6px;
  color:var(--text-secondary); user-select:none;
}
.cat-tab:hover { border-color:var(--accent); color:var(--text); }
.cat-tab.active {
  background:linear-gradient(135deg, rgba(99,102,241,.08), rgba(8,145,178,.06));
  border-color:var(--accent); color:var(--accent);
  box-shadow:0 2px 8px rgba(99,102,241,.12);
}

/* ═══ 服务商卡片网格（核心） ═══ */
.svc-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(160px, 1fr));
  gap:12px;
}

.svc-card {
  background:var(--card-bg); border:1.5px solid var(--card-border);
  border-radius:var(--radius-sm); padding:18px 14px; cursor:pointer;
  transition:all .22s ease; position:relative; display:flex; flex-direction:column;
  align-items:center; gap:8px; text-align:center; min-height:120px;
}
.svc-card:hover {
  border-color:var(--accent); transform:translateY(-3px);
  box-shadow:0 6px 20px rgba(99,102,241,.12);
}
.svc-card.configured {
  border-color:var(--success); background:#f0fdf4;
}
.svc-card.configured:hover { border-color:var(--success); box-shadow:0 6px 20px rgba(16,185,129,.15); }
.svc-card.disabled-card { opacity:.45; }

/* 已配置绿点 */
.svc-dot {
  position:absolute; top:10px; right:10px; width:10px; height:10px;
  border-radius:50%; background:var(--success); display:none;
}
.svc-card.configured .svc-dot { display:block; }
.svc-dot.inactive { background:var(--warning); }

/* 卡片图标 */
.svc-icon { font-size:32px; line-height:1; }
.svc-name { font-size:13px; font-weight:700; color:var(--text); line-height:1.3; }
.svc-code { font-size:11px; color:var(--text-muted); font-family:'Courier New',monospace; }

/* 自定义添加卡片 */
.svc-add {
  background:rgba(99,102,241,.03); border:2px dashed var(--card-border);
  border-radius:var(--radius-sm); min-height:120px; cursor:pointer;
  transition:all .22s; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:6px;
}
.svc-add:hover { border-color:var(--accent); background:rgba(99,102,241,.06); }
.svc-add-icon { font-size:26px; color:var(--text-muted); }
.svc-add-text { font-size:12.5px; color:var(--text-muted); font-weight:600; }

/* ═══ 右侧详情面板 ═══ */
.detail-panel {
  position:fixed; top:0; right:-420px; width:400px; height:100vh;
  background:var(--card-bg); border-left:1px solid var(--card-border);
  z-index:150; transition:right .3s cubic-bezier(.25,.8,.25,1);
  display:flex; flex-direction:column; overflow:hidden;
  box-shadow:-4px 0 30px rgba(0,0,0,.06);
}
.detail-panel.open { right:0; }
.detail-overlay {
  position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.2);
  z-index:140; display:none; backdrop-filter:blur(2px);
}
.detail-overlay.show { display:block; }

.dp-header {
  padding:20px 22px; border-bottom:1px solid var(--card-border);
  display:flex; align-items:center; gap:12px;
}
.dp-close {
  width:30px; height:30px; border-radius:8px; border:none; background:var(--input-bg);
  font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:all .18s; color:var(--text-secondary); flex-shrink:0;
}
.dp-close:hover { background:#e8ecf0; color:var(--text); }
.dp-title { font-size:16px; font-weight:700; flex:1; }
.dp-badge { font-size:11px; padding:3px 10px; border-radius:12px; font-weight:600; }
.badge-on { background:#dcfce7; color:#16a34a; }
.badge-off { background:#fef2f2; color:#dc2626; }

.dp-body { flex:1; overflow-y:auto; padding:20px 22px; }
.dp-field { margin-bottom:14px; }
.dp-label { font-size:11.5px; color:var(--text-muted); margin-bottom:4px; font-weight:600; text-transform:uppercase; letter-spacing:.4px; }
.dp-value { font-size:13.5px; color:var(--text); word-break:break-all; }
.dp-value-mono { font-family:'Courier New',monospace; font-size:12.5px; color:var(--accent-cyan); background:var(--input-bg); padding:6px 10px; border-radius:8px; }
.dp-config-row { display:flex; gap:8px; font-size:12px; color:var(--text-secondary); margin-bottom:6px; }
.dp-config-row .cl { color:var(--text-muted); min-width:56px; font-size:11px; }
.dp-desc { font-size:12.5px; color:var(--text-secondary); line-height:1.55; background:var(--input-bg); padding:10px 12px; border-radius:8px; margin-top:4px; }

.dp-actions { padding:16px 22px; border-top:1px solid var(--card-border); display:flex; gap:8px; flex-wrap:wrap; }
.dpb {
  padding:8px 16px; border-radius:9px; font-size:12.5px; font-weight:700;
  border:none; cursor:pointer; transition:all .18s; white-space:nowrap;
}
.dpb-primary { background:linear-gradient(135deg,var(--accent), var(--accent-cyan)); color:#fff; }
.dpb-primary:hover { transform:translateY(-1px); box-shadow:0 4px 16px rgba(99,102,241,.3); }
.dpb-outline { background:transparent; border:1.5px solid var(--card-border); color:var(--text-secondary); }
.dpb-outline:hover { border-color:var(--accent); color:var(--accent); background:rgba(99,102,241,.04); }
.dpb-danger { background:rgba(239,68,68,.06); color:var(--danger); }
.dpb-danger:hover { background:rgba(239,68,68,.12); }

/* 空状态（已弃用，保留备用） */
.empty-state { text-align:center; padding:60px 20px; color:var(--text-muted); grid-column:1/-1; display:none; }
.empty-icon { font-size:48px; margin-bottom:12px; opacity:.5; }
.empty-text { font-size:14px; }

/* ═══ 弹窗/表单 ═══ */
.modal-bg {
  position:fixed; top:0; left:0; right:0; bottom:0;
  background:rgba(0,0,0,.4); z-index:200; display:none;
  align-items:center; justify-content:center; backdrop-filter:blur(4px);
}
.modal-bg.open { display:flex; }
.modal {
  background:var(--card-bg); border:1px solid var(--card-border);
  border-radius:18px; width:560px; max-height:90vh; overflow-y:auto;
  padding:28px; box-shadow:0 20px 60px rgba(0,0,0,.15);
}
.modal-title { font-size:17px; font-weight:700; margin-bottom:20px; color:var(--text); }
.f-group { margin-bottom:14px; }
.f-label { font-size:12.5px; color:var(--text-secondary); margin-bottom:5px; display:flex; align-items:center; gap:5px; font-weight:600; }
.f-input {
  width:100%; padding:9px 12px; border-radius:9px;
  background:var(--input-bg); border:1.5px solid var(--card-border);
  color:var(--text); font-size:13px; transition:border-color .2s; outline:none;
}
.f-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(99,102,241,.1); }
textarea.f-input { min-height:70px; resize:vertical; font-family:inherit; }
select.f-input { cursor:pointer; }
.f-row { display:flex; gap:10px; }
.f-row .f-group { flex:1; }

/* Extra fields */
.extra-fields { margin-top:8px; padding:12px; background:var(--input-bg); border-radius:10px; }
.extra-fields .f-group { margin-bottom:10px; }
.extra-fields .f-group:last-child { margin-bottom:0; }
.extra-section-title { font-size:11.5px; color:var(--accent); font-weight:700; margin-bottom:8px; letter-spacing:.3px; }

/* Test result */
.test-result { margin-top:10px; padding:10px 14px; border-radius:10px; font-size:12.5px; font-weight:600; display:none; }
.test-result.ok { display:block; background:#dcfce7; border:1px solid #bbf7d0; color:#16a34a; }
.test-result.err { display:block; background:#fef2f2; border:1px solid #fecaca; color:#dc2626; }

.form-actions { display:flex; gap:10px; margin-top:20px; }
.btn-cancel { flex:1; padding:10px; border-radius:10px; border:1.5px solid var(--card-border);
  background:transparent; color:var(--text-secondary); font-size:13.5px; font-weight:600;
  cursor:pointer; transition:all .18s; }
.btn-cancel:hover { background:var(--input-bg); }
.btn-save { flex:2; padding:10px; border-radius:10px; border:none;
  background:linear-gradient(135deg,var(--accent), var(--accent-cyan));
  color:#fff; font-size:13.5px; font-weight:700; cursor:pointer; transition:all .2s; }
.btn-save:hover { transform:translateY(-1px); box-shadow:0 4px 16px rgba(99,102,241,.3); }

/* Toast */
.toast-container { position:fixed; top:70px; right:24px; z-index:999; display:flex; flex-direction:column; gap:8px; }
.toast { padding:10px 20px; border-radius:10px; font-size:13px; font-weight:600; animation:toastIn .3s ease; backdrop-filter:blur(8px); box-shadow:0 4px 16px rgba(0,0,0,.1); }
.toast-ok { background:#f0fdf4; border:1px solid #bbf7d0; color:#16a34a; }
.toast-err { background:#fef2f2; border:1px solid #fecaca; color:#dc2626; }
@keyframes toastIn { from{opacity:0;transform:translateX(30px)} to{opacity:1;transform:translateX(0)} }

/* 响应式 */
@media(max-width:640px){
  .svc-grid { grid-template-columns:repeat(auto-fill, minmax(130px, 1fr)); gap:10px; }
  .detail-panel { width:88%; right:-100%; }
  .modal { width:94%; padding:20px; }
  .page-wrap { padding:16px 14px 60px; }
  .cat-tabs { gap:4px; }
  .cat-tab { padding:5px 10px; font-size:12px; }
}
</style>
</head>
<body>

<!-- Top Nav -->
<nav class="top-nav">
  <a class="nav-brand" href="/">
    <span class="logo">AIManagePlatform</span>
  </a>
  <div style="flex:1"></div>
  <a class="nav-link" href="/">← 返回主页</a>
</nav>

<div class="page-wrap">
  <div class="page-header">
    <h1 class="page-title"><span>🌐 多领域服务配置</span></h1>
    <p class="page-desc">管理天气、导航、搜索、翻译等第三方服务的 API 配置与参数</p>
  </div>

  <!-- Category Tabs -->
  <div class="cat-tabs" id="catTabs"></div>

  <!-- Provider Card Grid -->
  <div class="svc-grid" id="svcGrid"></div>

  <!-- Empty state (hidden by default) -->
  <div class="empty-state" id="emptyState" style="display:none;">
    <div class="empty-icon">📭</div>
    <div class="empty-text">暂无此分类的配置</div>
  </div>
</div>

<!-- Detail Panel (right slide-in) -->
<div class="detail-overlay" id="detailOverlay" onclick="closeDetail()"></div>
<div class="detail-panel" id="detailPanel">
  <div class="dp-header">
    <button class="dp-close" onclick="closeDetail()">✕</button>
    <div class="dp-title" id="dpTitle">服务商详情</div>
    <div class="dp-badge badge-on" id="dpBadge">已启用</div>
  </div>
  <div class="dp-body" id="dpBody"></div>
  <div class="dp-actions" id="dpActions"></div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h2 class="modal-title" id="modalTitle">添加服务配置</h2>
    <form id="keyForm" onsubmit="return false;">
      <div class="f-group">
        <label class="f-label"><span style="color:var(--danger)">*</span> 服务分类</label>
        <select class="f-input" id="fCategory" onchange="onCategoryChange()">
          <option value="weather">🌤️ 天气服务</option>
          <option value="navigation">🗺️ 导航地图</option>
          <option value="search">🔍 搜索引擎</option>
          <option value="translation">🌐 翻译服务</option>
          <option value="storage">☁️ 云存储</option>
          <option value="notification">📬 消息推送</option>
          <option value="other">🔑 其他</option>
        </select>
      </div>
      <div class="f-row">
        <div class="f-group">
          <label class="f-label"><span style="color:var(--danger)">*</span> 服务商名称</label>
          <input class="f-input" id="fName" placeholder="如：和风天气、高德地图">
        </div>
        <div class="f-group">
          <label class="f-label"><span style="color:var(--danger)">*</span> 唯一标识</label>
          <input class="f-input" id="fCode" placeholder="如：qweather、amap">
        </div>
      </div>
      <div class="f-group">
        <label class="f-label"><span style="color:var(--danger)">*</span> API Key</label>
        <input type="password" class="f-input" id="fKeyValue" placeholder="输入密钥（编辑时留空则不修改）">
      </div>
      <div class="f-group">
        <label class="f-label">API 地址（可选）</label>
        <input class="f-input" id="fApiUrl" placeholder="如：https://devapi.qweather.com/v7/weather/now">
      </div>

      <!-- Weather extra fields -->
      <div class="extra-fields" id="fWeatherFields">
        <div class="extra-section-title">🌤️ 天气专属参数</div>
        <div class="f-row">
          <div class="f-group">
            <label class="f-label">默认城市</label>
            <input class="f-input" id="fWeatherCity" placeholder="如：北京、上海、深圳">
          </div>
          <div class="f-group">
            <label class="f-label">温度单位</label>
            <select class="f-input" id="fWeatherUnit">
              <option value="celsius">摄氏度 °C</option>
              <option value="fahrenheit">华氏度 °F</option>
            </select>
          </div>
        </div>
        <div class="f-group">
          <label class="f-label">语言</label>
          <select class="f-input" id="fWeatherLang">
            <option value="zh">中文</option>
            <option value="en">English</option>
          </select>
        </div>
      </div>

      <!-- Navigation extra fields -->
      <div class="extra-fields" id="fNavFields" style="display:none;">
        <div class="extra-section-title">🗺️ 导航专属参数</div>
        <div class="f-group">
          <label class="f-label">默认出发地</label>
          <input class="f-input" id="fNavOrigin" placeholder="如：北京市朝阳区">
        </div>
        <div class="f-row">
          <div class="f-group">
            <label class="f-label">偏好交通方式</label>
            <select class="f-input" id="fNavMode">
              <option value="driving">驾车</option>
              <option value="transit">公交地铁</option>
              <option value="walking">步行</option>
              <option value="cycling">骑行</option>
            </select>
          </div>
          <div class="f-group">
            <label class="f-label">坐标系</label>
            <select class="f-input" id="fNavCoord">
              <option value="autonavi">高德 GCJ-02</option>
              <option value="gps">WGS-84 (GPS)</option>
              <option value="baidu">百度 BD-09</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Search extra fields -->
      <div class="extra-fields" id="fSearchFields" style="display:none;">
        <div class="extra-section-title">🔍 搜索专属参数</div>
        <div class="f-row">
          <div class="f-group">
            <label class="f-label">搜索引擎偏好</label>
            <select class="f-input" id="fSearchEngine">
              <option value="google">Google</option>
              <option value="bing">Bing</option>
              <option value="baidu">百度</option>
              <option value="sogou">搜狗</option>
            </select>
          </div>
          <div class="f-group">
            <label class="f-label">结果数量</label>
            <input type="number" class="f-input" id="fSearchCount" placeholder="默认 10" min="1" max="50">
          </div>
        </div>
      </div>

      <!-- Translation extra fields -->
      <div class="extra-fields" id="fTransFields" style="display:none;">
        <div class="extra-section-title">🌐 翻译专属参数</div>
        <div class="f-row">
          <div class="f-group">
            <label class="f-label">源语言</label>
            <select class="f-input" id="fTransSrc">
              <option value="auto">自动检测</option>
              <option value="zh">中文</option>
              <option value="en">English</option>
              <option value="ja">日本語</option>
              <option value="ko">한국어</option>
            </select>
          </div>
          <div class="f-group">
            <label class="f-label">目标语言</label>
            <select class="f-input" id="fTransDst">
              <option value="en">English</option>
              <option value="zh">中文</option>
              <option value="ja">日本語</option>
              <option value="ko">한국어</option>
              <option value="fr">Français</option>
            </select>
          </div>
        </div>
      </div>

      <div class="f-group">
        <label class="f-label">备注说明</label>
        <textarea class="f-input" id="fDesc" placeholder="可选：记录此配置的用途等信息"></textarea>
      </div>
      <div class="f-group">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:var(--text-secondary);">
          <input type="checkbox" id="fIsActive" checked style="width:16px;height:16px;accent-color:var(--accent);">
          启用此配置
        </label>
      </div>

      <div class="test-result" id="testResultArea"></div>

      <div class="form-actions">
        <button class="btn-cancel" type="button" onclick="closeModal()">取消</button>
        <button class="btn-save" type="button" onclick="saveKey()">保存</button>
      </div>
    </form>
  </div>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<script>
/* ═════════════════════════════════════════
   多领域服务配置 — JavaScript 逻辑
   ═════════════════════════════════════════ */

var allKeys = [];
var currentCategory = 'weather';
var editKeyId = null;

// ── 预设服务商（每个分类的常用服务商） ──
var PRESETS = {
  weather: [
    {code:'qweather', name:'和风天气', icon:'🌤️', url:'https://devapi.qweather.com'},
    {code:'amap-weather', name:'高德天气', icon:'🌦️', url:'https://restapi.amap.com'},
    {code:'openweathermap', name:'OpenWeather', icon:'🌩️', url:'https://api.openweathermap.org'},
    {code:'cma', name:'中国气象局', icon:'🏛️', url:'https://data.cma.cn'},
    {code:'weather-cn', name:'中国天气网', icon:'🌈', url:'https://www.weather.com.cn'},
  ],
  navigation: [
    {code:'amap', name:'高德地图', icon:'🗺️', url:'https://restapi.amap.com'},
    {code:'baidu-map', name:'百度地图', icon:'🧭', url:'https://api.map.baidu.com'},
    {code:'tencent-map', name:'腾讯地图', icon:'📍', url:'https://apis.map.qq.com'},
    {code:'tianditu', name:'天地图', icon:'🌏', url:'https://api.tianditu.gov.cn'},
  ],
  search: [
    {code:'google-search', name:'Google Search', icon:'🔎', url:'https://www.googleapis.com'},
    {code:'bing-search', name:'Bing Search', icon:'🔍', url:'https://api.bing.microsoft.com'},
    {code:'baidu-search', name:'百度搜索', icon:'🔎', url:'https://api.baidu.com'},
    {code:'serp-api', name:'SerpAPI', icon:'🕷️', url:'https://serpapi.com'},
  ],
  translation: [
    {code:'youdao', name:'有道翻译', icon:'📖', url:'https://openapi.youdao.com'},
    {code:'baidu-trans', name:'百度翻译', icon:'🌐', url:'https://fanyi-api.baidu.com'},
    {code:'google-trans', name:'Google翻译', icon:'💬', url:'https://translation.googleapis.com'},
    {code:'deepl', name:'DeepL', icon:'📘', url:'https://api-free.deepl.com'},
  ],
  storage: [
    {code:'aliyun-oss', name:'阿里云 OSS', icon:'☁️', url:'https://oss-cn-hangzhou.aliyuncs.com'},
    {code:'tencent-cos', name:'腾讯 COS', icon:'☁️', url:'https://cos.ap-beijing.myqcloud.com'},
    {code:'aws-s3', name:'AWS S3', icon:'🪣', url:'https://s3.amazonaws.com'},
    {code:'qiniu', name:'七牛云', icon:'📦', url:'https://up.qbox.me'},
  ],
  notification: [
    {code:'jpush', name:'极光推送', icon:'📬', url:'https://api.jpush.cn'},
    {code:'getui', name:'个推', icon:'🔔', url:'https://restapi.getui.com'},
    {code:'ali-push', name:'阿里推送', icon:'📮', url:'https://cloudpush.aliyuncs.com'},
    {code:'wx-template', name:'微信模板消息', icon:'💬', url:'https://api.weixin.qq.com'},
  ],
  other: []
};

var CAT_ICONS = {weather:'🌤️', navigation:'🗺️', search:'🔍', translation:'🌐', storage:'☁️', notification:'📬', other:'🔑'};
var CAT_LABELS = {weather:'天气', navigation:'导航', search:'搜索', translation:'翻译', storage:'存储', notification:'推送', other:'其他'};

function esc(s) { var d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function toast(msg,type){var c=document.getElementById('toastContainer'),t=document.createElement('div');
  t.className='toast toast-'+(type||'ok'); t.textContent=msg; c.appendChild(t);
  setTimeout(function(){if(t.parentNode)t.parentNode.removeChild(t)},3000);}
function hdr(){
  try{var t=localStorage.getItem('access_token');
  return t?{'Authorization':'Bearer '+t,'Content-Type':'application/json'}:{'Content-Type':'application/json'};}
  catch(e){return{'Content-Type':'application/json'};}
}

// ── 渲染分类标签 ──
function renderCatTabs(){
  var cats=['weather','navigation','search','translation','storage','notification','other'];
  var h='';
  cats.forEach(function(k){
    var cnt=0;
    try{var xhr=new XMLHttpRequest();xhr.open('GET','/api/provider-keys',false);
      var h2=hdr();xhr.setRequestHeader('Content-Type','application/json');
      if(h2['Authorization'])xhr.setRequestHeader('Authorization',h2['Authorization']);xhr.send(null);
      if(xhr.status===200){var a=JSON.parse(xhr.responseText);(a.keys||[]).forEach(function(k2){if(k2.category===k)cnt++;});}}
    catch(e){}
    h+='<div class="cat-tab'+(currentCategory===k?' active':'')+'" data-cat="'+k+'">'+
      '<span>'+CAT_ICONS[k]+'</span><span>'+CAT_LABELS[k]+'</span>'+
      '</div>';
  });
  document.getElementById('catTabs').innerHTML=h;
  // 绑定事件
  document.querySelectorAll('.cat-tab').forEach(function(el){
    el.addEventListener('click',function(){switchCat(this.getAttribute('data-cat'));});
  });
}

// ── 加载当前分类的数据 ──
async function loadKeys(){try{
  var r=await fetch('/api/provider-keys?category='+encodeURIComponent(currentCategory),{headers:hdr()});
  if(r.status===401){allKeys=[];render();return;}if(!r.ok)throw new Error('HTTP '+r.status);
  var d=await r.json();allKeys=d.keys||[];
}catch(e){console.warn('[loadKeys]',e.message);allKeys=[];}render();}

// ── 核心渲染：预设卡片 + 已配置数据 + 添加按钮 ──
function render(){
  var grid=document.getElementById('svcGrid');
  var presets=PRESETS[currentCategory]||[];
  var h='';

  // 1. 渲染预设服务商卡片
  presets.forEach(function(p){
    var found=null;var configured=false;var active=true;
    allKeys.forEach(function(k){if(k.provider_code===p.code){found=k;configured=true;active=k.is_active!==false;}});
    h+='<div class="svc-card'+(configured?' configured':'')+(configured&&!active?' disabled-card':'')+'" data-code="'+esc(p.code)+'" data-preset="'+esc(p.name)+'" data-url="'+esc(p.url||'')+'">'+
      '<div class="svc-dot'+(!active?' inactive':'')+'"></div>'+
      '<div class="svc-icon">'+p.icon+'</div>'+
      '<div class="svc-name">'+esc(p.name)+'</div>'+
      '<div class="svc-code">'+esc(p.code)+'</div>'+
      (configured?'<div style="font-size:10.5px;color:var(--success);font-weight:600;margin-top:2px;">✓ 已配置</div>':'')+
      '</div>';
  });

  // 2. 渲染非预设的自定义已配置项（不在预设列表里的）
  allKeys.forEach(function(k){
    var isPreset=false;presets.forEach(function(p){if(p.code===k.provider_code)isPreset=true;});
    if(!isPreset){
      h+='<div class="svc-card configured'+(k.is_active===false?' disabled-card':'')+'" data-id="'+k.id+'" data-custom="1">'+
        '<div class="svc-dot'+(k.is_active===false?' inactive':'')+'"></div>'+
        '<div class="svc-icon">'+CAT_ICONS[currentCategory]+'</div>'+
        '<div class="svc-name">'+esc(k.provider_name)+'</div>'+
        '<div class="svc-code">'+esc(k.provider_code)+'</div>'+
        '<div style="font-size:10.5px;color:var(--accent);font-weight:600;margin-top:2px;">自定义</div>'+
        '</div>';
    }
  });

  // 3. "添加自定义" 按钮 — 始终显示
  h+='<div class="svc-add" id="addCustomBtn">'+
    '<div class="svc-add-icon">➕</div>'+
    '<div class="svc-add-text">添加 '+CAT_LABELS[currentCategory]+' 服务</div>'+
    '</div>';

  grid.innerHTML=h;

  // 绑定点击事件
  grid.querySelectorAll('.svc-card').forEach(function(el){
    el.addEventListener('click',function(){handleCardClick(this);});
  });
  var addBtn=document.getElementById('addCustomBtn');
  if(addBtn) addBtn.addEventListener('click',function(){addKey();});
}

// ── 处理卡片点击 ──
function handleCardClick(card){
  var code=card.getAttribute('data-code');
  var customId=card.getAttribute('data-id');
  var presetName=card.getAttribute('data-preset');

  if(customId && customId!=='null'){
    // 已配置的自定义项 → 打开详情面板
    openDetail(parseInt(customId));
  }else if(code){
    // 预设卡片 → 查找是否已配置
    var foundKey=null;
    allKeys.forEach(function(k){if(k.provider_code===code)foundKey=k;});

    if(foundKey){
      // 已配置 → 打开详情面板
      openDetail(foundKey.id);
    }else{
      // 未配置 → 弹出添加表单并预填
      addKeyForPreset(code,presetName,card.getAttribute('data-url'));
    }
  }
}

// ── 详情面板 ──
async function openDetail(id){
  try{
    var r=await fetch('/api/provider-keys/'+id,{headers:hdr()});if(!r.ok)throw new Error('HTTP '+r.status);
    var d=await r.json();
    var body=document.getElementById('dpBody');
    var actions=document.getElementById('dpActions');

    document.getElementById('dpTitle').textContent=d.provider_name;
    var badge=document.getElementById('dpBadge');
    if(d.is_active!==false){badge.textContent='已启用';badge.className='dp-badge badge-on';}
    else{badge.textContent='已禁用';badge.className='dp-badge badge-off';}

    var extraHtml='';
    if(d.config&&typeof d.config==='object'){
      extraHtml='<div style="margin:14px 0;padding:12px;background:var(--input-bg);border-radius:10px;"><div class="extra-section-title">⚙️ 专属参数</div>';
      var cfg=d.config;
      if(cfg.city)extraHtml+='<div class="dp-config-row"><span class="cl">城市</span><span>'+esc(cfg.city)+'</span></div>';
      if(cfg.unit)extraHtml+='<div class="dp-config-row"><span class="cl">温度单位</span><span>'+esc(cfg.unit==='celsius'?'°C':'°F')+'</span></div>';
      if(cfg.lang)extraHtml+='<div class="dp-config-row"><span class="cl">语言</span><span>'+esc(cfg.lang==='zh'?'中文':'English')+'</span></div>';
      if(cfg.origin)extraHtml+='<div class="dp-config-row"><span class="cl">出发地</span><span>'+esc(cfg.origin)+'</span></div>';
      if(cfg.mode)extraHtml+='<div class="dp-config-row"><span class="cl">交通方式</span><span>'+esc({driving:'驾车',transit:'公交地铁',walking:'步行',cycling:'骑行'}[cfg.mode]||cfg.mode)+'</span></div>';
      if(cfg.coord)extraHtml+='<div class="dp-config-row"><span class="cl">坐标系</span><span>'+esc({autonavi:'GCJ-02',gps:'WGS-84',baidu:'BD-09'}[cfg.coord]||cfg.coord)+'</span></div>';
      if(cfg.engine)extraHtml+='<div class="dp-config-row"><span class="cl">引擎</span><span>'+esc(cfg.engine)+'</span></div>';
      if(cfg.count)extraHtml+='<div class="dp-config-row"><span class="cl">结果数</span><span>'+esc(String(cfg.count))+'</span></div>';
      if(cfg.src)extraHtml+='<div class="dp-config-row"><span class="cl">源语言</span><span>'+esc(cfg.src)+'</span></div>';
      if(cfg.dst)extraHtml+='<div class="dp-config-row"><span class="cl">目标语言</span><span>'+esc(cfg.dst)+'</span></div>';
      extraHtml+='</div>';
    }

    body.innerHTML=
      '<div class="dp-field"><div class="dp-label">唯一标识</div><div class="dp-value-mono">'+esc(d.provider_code)+'</div></div>'+
      '<div class="dp-field"><div class="dp-label">API 密钥</div><div class="dp-value-mono">'+esc(d.key_masked||'-')+'</div></div>'+
      (d.api_url?'<div class="dp-field"><div class="dp-label">API 地址</div><div class="dp-value" style="word-break:break-all;font-size:12px;color:var(--accent-cyan);">'+esc(d.api_url)+'</div></div>':'')+
      (d.description?'<div class="dp-field"><div class="dp-label">备注</div><div class="dp-desc">'+esc(d.description)+'</div></div>':'')+
      extraHtml+
      '<div class="dp-field" style="margin-top:12px;"><div class="dp-label">创建时间</div><div class="dp-value" style="font-size:12px;color:var(--text-muted);">'+(d.created_at||'-')+'</div></div>'+
      '<div class="dp-field"><div class="dp-label">更新时间</div><div class="dp-value" style="font-size:12px;color:var(--text-muted);">'+(d.updated_at||'-')+'</div></div>';

    actions.innerHTML=
      '<button class="dpb dpb-primary" onclick="editKey('+id+');closeDetail();">✏️ 编辑</button>'+
      '<button class="dpb dpb-outline" onclick="testKey('+id+')">🔗 测试连接</button>'+
      '<button class="dpb dpb-outline" onclick="toggleKey('+id+')">'+(d.is_active!==false?'⏸ 禁用':'▶ 启用')+'</button>'+
      '<button class="dpb dpb-danger" onclick="confirmDelete('+id+');closeDetail();">🗑 删除</button>';

    document.getElementById('detailPanel').classList.add('open');
    document.getElementById('detailOverlay').classList.add('show');
  }catch(e){toast('加载详情失败：'+e.message,'err');}
}

function closeDetail(){document.getElementById('detailPanel').classList.remove('open');document.getElementById('detailOverlay').classList.remove('show');}

// ── 为预设服务商快速添加 ──
function addKeyForPreset(code,name,url){
  editKeyId=null;
  document.getElementById('modalTitle').textContent='配置 '+name;
  document.getElementById('keyForm').reset();
  document.getElementById('fCategory').value=currentCategory;
  document.getElementById('fName').value=name||'';
  document.getElementById('fCode').value=code||'';
  document.getElementById('fApiUrl').value=url||'';
  document.getElementById('fIsActive').checked=true;
  onCategoryChange();
  document.getElementById('modalBg').classList.add('open');
}

// ── 添加自定义 ──
function addKey(){
  editKeyId=null;
  document.getElementById('modalTitle').textContent='添加 '+CAT_LABELS[currentCategory]+' 服务';
  document.getElementById('keyForm').reset();
  document.getElementById('fCategory').value=currentCategory;
  document.getElementById('fIsActive').checked=true;
  onCategoryChange();
  document.getElementById('modalBg').classList.add('open');
}

// ── 编辑 ──
async function editKey(id){
  editKeyId=id;document.getElementById('modalTitle').textContent='编辑服务配置';
  try{var r=await fetch('/api/provider-keys/'+id,{headers:hdr()});if(!r.ok)throw new Error('HTTP '+r.status);
    var d=await r.json();
    document.getElementById('fCategory').value=d.category||'weather';
    document.getElementById('fName').value=d.provider_name||'';
    document.getElementById('fCode').value=d.provider_code||'';
    document.getElementById('fApiUrl').value=d.api_url||'';
    document.getElementById('fDesc').value=d.description||'';
    document.getElementById('fIsActive').checked=d.is_active!==false;
    document.getElementById('fKeyValue').value='';
    document.getElementById('fKeyValue').placeholder=d.key_masked?'当前：'+d.key_masked+'（留空不修改）':'输入新密钥';

    var cfg=d.config||{};
    document.getElementById('fWeatherCity').value=cfg.city||'';
    document.getElementById('fWeatherUnit').value=cfg.unit||'celsius';
    document.getElementById('fWeatherLang').value=cfg.lang||'zh';
    document.getElementById('fNavOrigin').value=cfg.origin||'';
    document.getElementById('fNavMode').value=cfg.mode||'driving';
    document.getElementById('fNavCoord').value=cfg.coord||'autonavi';
    document.getElementById('fSearchEngine').value=cfg.engine||'google';
    document.getElementById('fSearchCount').value=cfg.count||10;
    document.getElementById('fTransSrc').value=cfg.src||'auto';
    document.getElementById('fTransDst').value=cfg.dst||'en';
    onCategoryChange();
  }catch(e){toast('加载失败：'+e.message,'err');return;}
  document.getElementById('modalBg').classList.add('open');
}

// ── 分类切换显示额外字段 ──
function onCategoryChange(){
  var cat=document.getElementById('fCategory').value;
  document.getElementById('fWeatherFields').style.display=cat==='weather'?'block':'none';
  document.getElementById('fNavFields').style.display=cat==='navigation'?'block':'none';
  document.getElementById('fSearchFields').style.display=cat==='search'?'block':'none';
  document.getElementById('fTransFields').style.display=cat==='translation'?'block':'none';
}

// ── 收集额外配置 ──
function collectConfig(){
  var cat=document.getElementById('fCategory').value;var cfg={};
  if(cat==='weather'){cfg.city=document.getElementById('fWeatherCity').value.trim();cfg.unit=document.getElementById('fWeatherUnit').value;cfg.lang=document.getElementById('fWeatherLang').value;}
  else if(cat==='navigation'){cfg.origin=document.getElementById('fNavOrigin').value.trim();cfg.mode=document.getElementById('fNavMode').value;cfg.coord=document.getElementById('fNavCoord').value;}
  else if(cat==='search'){cfg.engine=document.getElementById('fSearchEngine').value;cfg.count=parseInt(document.getElementById('fSearchCount').value)||10;}
  else if(cat==='translation'){cfg.src=document.getElementById('fTransSrc').value;cfg.dst=document.getElementById('fTransDst').value;}
  var hasValue=false;for(var k in cfg){if(cfg[k]){hasValue=true;break;}}return hasValue?cfg:undefined;
}

// ── 保存 ──
async function saveKey(){
  var name=document.getElementById('fName').value.trim();
  var code=document.getElementById('fCode').value.trim();
  var keyValue=document.getElementById('fKeyValue').value.trim();
  if(!name||!code){toast('请填写名称和标识','err');return;}
  if(!editKeyId&&!keyValue){toast('请填写 API Key','err');return;}

  var cat=document.getElementById('fCategory').value;
  var data={provider_name:name,provider_code:code,category:cat,key_value:keyValue,
    api_url:document.getElementById('fApiUrl').value.trim(),
    is_active:document.getElementById('fIsActive').checked,
    description:document.getElementById('fDesc').value.trim(),config:collectConfig()};
  try{var url,method;
    if(editKeyId){url='/api/provider-keys/'+editKeyId;method='PUT';if(!keyValue)delete data.key_value;}
    else{url='/api/provider-keys';method='POST';}
    var r=await fetch(url,{method:method,headers:hdr(),body:JSON.stringify(data)});
    if(!r.ok){var err=await r.json().catch(function(){});throw new Error(err&&err.detail||'HTTP '+r.status);}
    toast(editKeyId?'更新成功 ✅':'添加成功 ✅','ok');
    closeModal();loadKeys();renderCatTabs();
  }catch(e){toast('保存失败：'+e.message,'err');}
}

// ── 切换启用/禁用 ──
async function toggleKey(id){try{
  var r=await fetch('/api/provider-keys/'+id+'/toggle',{method:'PATCH',headers:hdr()});
  if(!r.ok)throw new Error('HTTP '+r.status);loadKeys();
}catch(e){toast('操作失败：'+e.message,'err');}}

// ── 测试连接 ──
async function testKey(id){try{
  var rEl=document.getElementById('testResultArea');rEl.className='test-result';rEl.style.display='none';
  toast('正在测试连接...','ok');
  var r=await fetch('/api/provider-keys/'+id+'/test',{method:'POST',headers:hdr()});
  var d=await r.json();
  if(d.success){toast('✅ '+d.message,'ok');}else{toast('❌ '+(d.error||'测试失败'),'err');}
}catch(e){toast('测试异常：'+e.message,'err');}}

// ── 删除 ──
function confirmDelete(id){if(!confirm('确定删除此配置？不可恢复'))return;
  (async function(){try{var r=await fetch('/api/provider-keys/'+id,{method:'DELETE',headers:hdr()});
    if(!r.ok)throw new Error('HTTP '+r.status);toast('已删除','ok');loadKeys();renderCatTabs();}
  catch(e){toast('删除失败：'+e.message,'err');}})();}

// ── 关闭弹窗 ──
function closeModal(){document.getElementById('modalBg').classList.remove('open');editKeyId=null;}

// ── 分类切换 ──
function switchCat(cat){currentCategory=cat;renderCatTabs();loadKeys();}

// ── Init ──
(async function(){renderCatTabs();await loadKeys();})();
</script>
</body>
</html>
