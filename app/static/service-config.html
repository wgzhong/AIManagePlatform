<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>多领域服务配置 — AIManagePlatform</title>
<style>
/* ═════════════════════════════════════════
   多领域服务配置 — 玻璃拟态风格
   ═════════════════════════════════════════ */
:root {
  --bg: #0a0a1f;
  --card-bg: rgba(255,255,255,.06);
  --card-border: rgba(255,255,255,.1);
  --input-bg: rgba(255,255,255,.08);
  --text: #e2e8f0;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --accent: #6366f1;
  --accent-2: #8b5cf6;
  --accent-cyan: #72e0e0;
  --danger: #f43f5e;
  --success: #10b981;
  --warning: #facc15;
  --radius: 14px;
  --radius-sm: 10px;
}
* { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",system-ui,sans-serif;
  background:var(--bg); color:var(--text);
  min-height:100vh; line-height:1.55; font-size:14px;
  background-image:
    radial-gradient(ellipse at 20% -10%, rgba(16,185,129,.15) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 110%, rgba(99,102,241,.12) 0%, transparent 50%);
  background-attachment: fixed;
}
a { color:var(--accent-cyan); text-decoration:none; }

/* ── Top Nav ── */
.top-nav {
  position:sticky; top:0; z-index:100;
  background:rgba(10,10,31,.85); backdrop-filter:saturate(180%) blur(16px);
  border-bottom:1px solid rgba(255,255,255,.08);
  padding:0 28px; height:54px; display:flex; align-items:center; gap:14px;
}
.nav-brand { display:flex; align-items:center; gap:9px; text-decoration:none; color:inherit; }
.nav-brand .logo { font-size:17px; font-weight:700; background:linear-gradient(135deg,var(--accent), var(--accent-2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.nav-link { color:var(--text-secondary); text-decoration:none; font-size:13px; padding:6px 14px; border-radius:8px; transition:all .18s; }
.nav-link:hover { background:rgba(99,102,241,.15); color:var(--accent-cyan); }

/* ── Page ── */
.page-wrap { max-width:1200px; margin:0 auto; padding:32px 28px 90px; }

/* Header */
.page-header { margin-bottom:24px; }
.page-title { font-size:26px; font-weight:800; background:linear-gradient(135deg,var(--accent-cyan), var(--accent-2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.page-desc { color:var(--text-secondary); font-size:13.5px; margin-top:6px; }

/* ═══ 分类标签栏 ═══ */
.cat-tabs { display:flex; gap:8px; margin-bottom:24px; flex-wrap:wrap; }
.cat-tab {
  padding:8px 18px; border-radius:20px; font-size:13px; font-weight:600;
  background:var(--card-bg); border:1.5px solid var(--card-border);
  cursor:pointer; transition:all .2s; display:flex; align-items:center; gap:7px;
  color:var(--text-secondary); user-select:none;
}
.cat-tab:hover { border-color:rgba(16,185,129,.3); color:var(--text); }
.cat-tab.active {
  background:linear-gradient(135deg, rgba(16,185,129,.18), rgba(99,102,241,.15));
  border-color:var(--success); color:var(--accent-cyan);
}
.cat-tab .cat-count { font-size:11px; background:rgba(255,255,255,.1); padding:1px 8px; border-radius:10px; }

/* ═══ 配置卡片网格 ═══ */
.key-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(340px, 1fr)); gap:16px; }
.key-card {
  background:var(--card-bg); border:1.5px solid var(--card-border);
  border-radius:var(--radius); padding:20px; transition:all .25s;
  position:relative; overflow:hidden;
}
.key-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:3px;
  background:linear-gradient(90deg, var(--success), var(--accent-2));
  opacity:0; transition:opacity .25s;
}
.key-card:hover::before { opacity:1; }
.key-card:hover { border-color:rgba(16,185,129,.3); transform:translateY(-2px); }
.key-card.disabled { opacity:.55; }
.key-card.disabled::after {
  content:''; position:absolute; top:0; left:0; right:0; bottom:0;
  background:rgba(0,0,0,.15); pointer-events:none; border-radius:var(--radius);
}

/* Card Header */
.key-header { display:flex; align-items:center; gap:12px; margin-bottom:14px; }
.key-icon { font-size:28px; width:44px; height:44px; display:flex; align-items:center; justify-content:center;
  background:rgba(255,255,255,.06); border-radius:12px; flex-shrink:0; }
.key-name { font-size:15px; font-weight:700; flex:1; }
.key-badge {
  font-size:10px; padding:3px 10px; border-radius:12px; font-weight:600; white-space:nowrap;
}
.badge-active { background:rgba(16,185,129,.15); color:var(--success); }
.badge-inactive { background:rgba(244,63,94,.12); color:var(--danger); }

/* Card Body */
.key-field { margin-bottom:10px; }
.key-field-label { font-size:11px; color:var(--text-muted); margin-bottom:3px; text-transform:uppercase; letter-spacing:.5px; }
.key-value { font-size:13px; font-family:'Courier New', monospace; color:var(--accent-cyan); }
.key-url { font-size:12px; color:var(--text-secondary); word-break:break-all; }
.key-desc { font-size:12.5px; color:var(--text-secondary); line-height:1.5; }

/* Config rows (weather/navigation specific) */
.key-config-rows { margin-top:10px; display:flex; flex-direction:column; gap:6px; }
.key-config-row { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--text-secondary); }
.key-config-row .cfg-label { color:var(--text-muted); min-width:60px; font-size:11px; text-transform:uppercase; letter-spacing:.5px; }
.key-config-row .cfg-value { color:var(--accent-cyan); }

/* Card Actions */
.key-actions { display:flex; gap:8px; margin-top:16px; padding-top:14px; border-top:1px solid rgba(255,255,255,.06); flex-wrap:wrap; }
.key-btn {
  padding:6px 14px; border-radius:8px; font-size:12px; font-weight:600;
  border:none; cursor:pointer; transition:all .18s; white-space:nowrap;
}
.btn-edit { background:rgba(99,102,241,.15); color:var(--accent-cyan); }
.btn-edit:hover { background:rgba(99,102,241,.25); }
.btn-test { background:rgba(16,185,129,.12); color:var(--success); }
.btn-test:hover { background:rgba(16,185,129,.22); }
.btn-toggle { background:rgba(255,255,255,.06); color:var(--text-secondary); }
.btn-toggle:hover { background:rgba(255,255,255,.12); }
.btn-delete { background:rgba(244,63,94,.1); color:var(--danger); margin-left:auto; }
.btn-delete:hover { background:rgba(244,63,94,.2); }

/* ═══ 添加按钮 ═══ */
.add-card {
  background:rgba(255,255,255,.03); border:2px dashed rgba(255,255,255,.12);
  border-radius:var(--radius); padding:20px; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:10px; cursor:pointer;
  transition:all .25s; min-height:180px;
}
.add-card:hover { border-color:rgba(16,185,129,.4); background:rgba(16,185,129,.06); }
.add-icon { font-size:32px; color:var(--text-muted); }
.add-text { font-size:13px; color:var(--text-muted); }

/* ═══ 弹窗/表单 ═══ */
.modal-bg {
  position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.65);
  z-index:200; display:none; align-items:center; justify-content:center;
  backdrop-filter:blur(6px);
}
.modal-bg.open { display:flex; }
.modal {
  background:linear-gradient(180deg, rgba(20,20,50,.99) 0%, rgba(15,15,38,.995) 100%);
  border:1.5px solid rgba(255,255,255,.12); border-radius:20px;
  width:600px; max-height:92vh; overflow-y:auto; padding:28px;
  box-shadow:0 20px 60px rgba(0,0,0,.5);
}
.modal-title { font-size:18px; font-weight:700; margin-bottom:20px;
  background:linear-gradient(135deg,var(--accent-cyan), var(--accent-2));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
.f-group { margin-bottom:16px; }
.f-label { font-size:12.5px; color:var(--text-secondary); margin-bottom:6px; display:flex; align-items:center; gap:6px; }
.f-input {
  width:100%; padding:10px 14px; border-radius:10px;
  background:var(--input-bg); border:1.5px solid rgba(255,255,255,.1);
  color:var(--text); font-size:13.5px; transition:border-color .2s; outline:none;
}
.f-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(99,102,241,.15); }
.f-input::placeholder { color:var(--text-muted); }
textarea.f-input { min-height:80px; resize:vertical; font-family:inherit; }
select.f-input { cursor:pointer; }
.f-row { display:flex; gap:12px; }
.f-row .f-group { flex:1; }

/* Extra fields (weather/navigation/search/translation) */
.extra-fields { margin-top:12px; }
.extra-field-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.extra-field-label { font-size:12px; color:var(--text-muted); min-width:80px; }

/* Test result */
.test-result { margin-top:10px; padding:10px 14px; border-radius:10px; font-size:12.5px; font-weight:600; display:none; }
.test-result.ok { display:block; background:rgba(16,185,129,.12); border:1px solid rgba(16,185,129,.25); color:var(--success); }
.test-result.err { display:block; background:rgba(244,63,94,.1); border:1px solid rgba(244,63,94,.2); color:var(--danger); }

/* Form Actions */
.form-actions { display:flex; gap:10px; margin-top:24px; }
.btn-cancel { flex:1; padding:10px; border-radius:10px; border:1.5px solid rgba(255,255,255,.1);
  background:transparent; color:var(--text-secondary); font-size:13.5px; font-weight:600;
  cursor:pointer; transition:all .18s; }
.btn-cancel:hover { background:rgba(255,255,255,.06); }
.btn-save { flex:2; padding:10px; border-radius:10px; border:none;
  background:linear-gradient(135deg,var(--accent), var(--accent-2));
  color:#fff; font-size:13.5px; font-weight:700; cursor:pointer; transition:all .2s; }
.btn-save:hover { transform:translateY(-1px); box-shadow:0 4px 20px rgba(99,102,241,.35); }

/* ═══ Toast ═══ */
.toast-container { position:fixed; top:70px; right:24px; z-index:999; display:flex; flex-direction:column; gap:8px; }
.toast {
  padding:10px 20px; border-radius:10px; font-size:13px; font-weight:600;
  animation:toastIn .3s ease; backdrop-filter:blur(8px);
}
.toast-ok { background:rgba(16,185,129,.2); border:1px solid rgba(16,185,129,.3); color:var(--success); }
.toast-err { background:rgba(244,63,94,.15); border:1px solid rgba(244,63,94,.25); color:var(--danger); }
@keyframes toastIn { from{opacity:0;transform:translateX(30px)} to{opacity:1;transform:translateX(0)} }

/* ═══ 空状态 ═══ */
.empty-state { text-align:center; padding:60px 20px; color:var(--text-muted); grid-column:1/-1; }
.empty-icon { font-size:48px; margin-bottom:16px; opacity:.6; }
.empty-text { font-size:14px; }

/* ═══ 响应式 ═══ */
@media(max-width:640px){
  .key-grid { grid-template-columns:1fr; }
  .modal { width:95%; padding:20px; }
  .page-wrap { padding:20px 16px 60px; }
  .cat-tabs { gap:5px; }
  .cat-tab { padding:6px 12px; font-size:12px; }
}
</style>
</head>
<body>

<!-- Top Nav -->
<nav class="top-nav">
  <a class="nav-brand" href="/">
    <span class="logo">AIManagePlatform</span>
    <span class="nav-tag" style="font-size:11px;padding:2px 8px;border-radius:6px;background:rgba(16,185,129,.18);color:var(--accent-cyan);">多领域服务</span>
  </a>
  <div style="flex:1"></div>
  <a class="nav-link" href="/">← 返回主页</a>
</nav>

<div class="page-wrap">
  <div class="page-header">
    <h1 class="page-title">🌐 多领域服务配置</h1>
    <p class="page-desc">管理天气、导航、搜索、翻译等第三方服务的 API 配置与参数</p>
  </div>

  <!-- Category Tabs -->
  <div class="cat-tabs" id="catTabs"></div>

  <!-- Key Grid -->
  <div class="key-grid" id="keyGrid"></div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h2 class="modal-title" id="modalTitle">添加服务配置</h2>
    <form id="keyForm" onsubmit="return false;">
      <div class="f-group">
        <label class="f-label"><span style="color:var(--danger)">*</span> 服务分类</label>
        <select class="f-input" id="fCategory" onchange="onCategoryChange()">
          <option value="weather">🌤️ 天气服务</option>
          <option value="navigation">🗺️ 导航地图</option>
          <option value="search">🔍 搜索引擎</option>
          <option value="translation">🌐 翻译服务</option>
          <option value="storage">☁️ 云存储</option>
          <option value="notification">📬 消息推送</option>
          <option value="other">🔑 其他</option>
        </select>
      </div>
      <div class="f-row">
        <div class="f-group">
          <label class="f-label"><span style="color:var(--danger)">*</span> 服务商名称</label>
          <input class="f-input" id="fName" placeholder="如：高德天气、和风天气">
        </div>
        <div class="f-group">
          <label class="f-label"><span style="color:var(--danger)">*</span> 唯一标识</label>
          <input class="f-input" id="fCode" placeholder="如：amap-weather、qweather">
        </div>
      </div>
      <div class="f-group">
        <label class="f-label"><span style="color:var(--danger)">*</span> API Key</label>
        <input type="password" class="f-input" id="fKeyValue" placeholder="输入密钥（编辑时留空则不修改）">
      </div>
      <div class="f-group">
        <label class="f-label">API 地址（可选）</label>
        <input class="f-input" id="fApiUrl" placeholder="如：https://restapi.amap.com/v3/weather/weatherInfo">
      </div>

      <!-- Weather extra fields -->
      <div class="extra-fields" id="fWeatherFields">
        <div class="f-group">
          <label class="f-label">默认城市</label>
          <input class="f-input" id="fWeatherCity" placeholder="如：北京、上海、深圳">
        </div>
        <div class="f-row">
          <div class="f-group">
            <label class="f-label">温度单位</label>
            <select class="f-input" id="fWeatherUnit">
              <option value="celsius">摄氏度 °C</option>
              <option value="fahrenheit">华氏度 °F</option>
            </select>
          </div>
          <div class="f-group">
            <label class="f-label">语言</label>
            <select class="f-input" id="fWeatherLang">
              <option value="zh">中文</option>
              <option value="en">English</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Navigation extra fields -->
      <div class="extra-fields" id="fNavFields" style="display:none;">
        <div class="f-group">
          <label class="f-label">默认出发地</label>
          <input class="f-input" id="fNavOrigin" placeholder="如：北京市朝阳区">
        </div>
        <div class="f-row">
          <div class="f-group">
            <label class="f-label">偏好交通方式</label>
            <select class="f-input" id="fNavMode">
              <option value="driving">驾车</option>
              <option value="transit">公交地铁</option>
              <option value="walking">步行</option>
              <option value="cycling">骑行</option>
            </select>
          </div>
          <div class="f-group">
            <label class="f-label">坐标系</label>
            <select class="f-input" id="fNavCoord">
              <option value="autonavi">高德 GCJ-02</option>
              <option value="gps">WGS-84 (GPS)</option>
              <option value="baidu">百度 BD-09</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Search extra fields -->
      <div class="extra-fields" id="fSearchFields" style="display:none;">
        <div class="f-group">
          <label class="f-label">搜索引擎偏好</label>
          <select class="f-input" id="fSearchEngine">
            <option value="google">Google</option>
            <option value="bing">Bing</option>
            <option value="baidu">百度</option>
            <option value="sogou">搜狗</option>
          </select>
        </div>
        <div class="f-group">
          <label class="f-label">结果数量（每次返回）</label>
          <input type="number" class="f-input" id="fSearchCount" placeholder="默认 10" min="1" max="50">
        </div>
      </div>

      <!-- Translation extra fields -->
      <div class="extra-fields" id="fTransFields" style="display:none;">
        <div class="f-row">
          <div class="f-group">
            <label class="f-label">源语言</label>
            <select class="f-input" id="fTransSrc">
              <option value="auto">自动检测</option>
              <option value="zh">中文</option>
              <option value="en">English</option>
              <option value="ja">日本語</option>
              <option value="ko">한국어</option>
            </select>
          </div>
          <div class="f-group">
            <label class="f-label">目标语言</label>
            <select class="f-input" id="fTransDst">
              <option value="zh">中文</option>
              <option value="en">English</option>
              <option value="ja">日本語</option>
              <option value="ko">한국어</option>
              <option value="fr">Français</option>
            </select>
          </div>
        </div>
      </div>

      <div class="f-group">
        <label class="f-label">备注说明</label>
        <textarea class="f-input" id="fDesc" placeholder="可选：记录此配置的用途、限制等信息"></textarea>
      </div>
      <div class="f-group">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
          <input type="checkbox" id="fIsActive" checked>
          <span class="f-label" style="margin:0;">启用此配置</span>
        </label>
      </div>

      <!-- Test result -->
      <div class="test-result" id="testResult"></div>

      <div class="form-actions">
        <button class="btn-cancel" type="button" onclick="closeModal()">取消</button>
        <button class="btn-save" type="button" onclick="saveKey()">保存</button>
      </div>
    </form>
  </div>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<script>
/* ═════════════════════════════════════════
   多领域服务配置 — JavaScript 逻辑
   ═════════════════════════════════════════ */

var allKeys = [];
var currentCategory = 'weather';  // 默认显示天气
var editKeyId = null;

function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function toast(msg, type) {
  var c = document.getElementById('toastContainer');
  var t = document.createElement('div');
  t.className = 'toast toast-' + (type || 'ok');
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(function() { if (t.parentNode) t.parentNode.removeChild(t); }, 3000);
}
function hdr() {
  try {
    var t = localStorage.getItem('access_token');
    return t ? {'Authorization': 'Bearer ' + t, 'Content-Type': 'application/json'} : {'Content-Type': 'application/json'};
  } catch(e) { return {'Content-Type': 'application/json'}; }
}

// ── Category config ──
var CAT_ICONS = {weather:'🌤️', navigation:'🗺️', search:'🔍', translation:'🌐', storage:'☁️', notification:'📬', other:'🔑'};
var CAT_LABELS = {weather:'天气', navigation:'导航', search:'搜索', translation:'翻译', storage:'存储', notification:'推送', other:'其他'};

// ── Load Keys ──
async function loadKeys() {
  try {
    var url = '/api/provider-keys?category=' + encodeURIComponent(currentCategory);
    var r = await fetch(url, {headers: hdr()});
    if (r.status === 401) { allKeys = []; render(); return; }
    if (!r.ok) throw new Error('HTTP ' + r.status);
    var d = await r.json();
    allKeys = d.keys || [];
  } catch(e) {
    console.warn('[loadKeys]', e.message);
    allKeys = [];
  }
  render();
}

// ── Render Category Tabs ──
function renderCatTabs() {
  var cats = ['weather','navigation','search','translation','storage','notification','other'];
  var h = '';
  cats.forEach(function(k) {
    var cnt = 0;
    // Count from all keys (we need to load all for accurate counts)
    var cntUrl = '/api/provider-keys';
    // Use sync XHR for simplicity in tab rendering (only for count)
    try {
      var xhr = new XMLHttpRequest();
      xhr.open('GET', cntUrl, false);
      var h2 = hdr();
      xhr.setRequestHeader('Content-Type', 'application/json');
      if (h2['Authorization']) xhr.setRequestHeader('Authorization', h2['Authorization']);
      xhr.send(null);
      if (xhr.status === 200) {
        var all = JSON.parse(xhr.responseText);
        all.keys.forEach(function(k2) { if (k2.category === k) cnt++; });
      }
    } catch(e) {}
    h += '<div class="cat-tab' + (currentCategory === k ? ' active' : '') + '" onclick="switchCat(\'' + k + '\')">' +
      '<span>' + CAT_ICONS[k] + '</span><span>' + CAT_LABELS[k] + '</span>' +
      '<span class="cat-count">' + cnt + '</span></div>';
  });
  document.getElementById('catTabs').innerHTML = h;
}

// ── Render Key Grid ──
function render() {
  var grid = document.getElementById('keyGrid');

  if (allKeys.length === 0) {
    grid.innerHTML = '<div class="empty-state">' +
      '<div class="empty-icon">' + CAT_ICONS[currentCategory] + '</div>' +
      '<div class="empty-text">暂无' + CAT_LABELS[currentCategory] + '配置，点击下方卡片添加</div></div>';
  } else {
    var h = '';
    allKeys.forEach(function(k) {
      // Extra config display
      var extraHtml = '';
      if (k.config && typeof k.config === 'object') {
        extraHtml = '<div class="key-config-rows">';
        var cfg = k.config;
        if (k.category === 'weather') {
          if (cfg.city) extraHtml += '<div class="key-config-row"><span class="cfg-label">城市</span><span class="cfg-value">' + esc(cfg.city) + '</span></div>';
          if (cfg.unit) extraHtml += '<div class="key-config-row"><span class="cfg-label">单位</span><span class="cfg-value">' + esc(cfg.unit === 'celsius' ? '°C' : '°F') + '</span></div>';
        } else if (k.category === 'navigation') {
          if (cfg.origin) extraHtml += '<div class="key-config-row"><span class="cfg-label">出发地</span><span class="cfg-value">' + esc(cfg.origin) + '</span></div>';
          if (cfg.mode) extraHtml += '<div class="key-config-row"><span class="cfg-label">交通</span><span class="cfg-value">' + esc(cfg.mode) + '</span></div>';
        } else if (k.category === 'search') {
          if (cfg.engine) extraHtml += '<div class="key-config-row"><span class="cfg-label">引擎</span><span class="cfg-value">' + esc(cfg.engine) + '</span></div>';
          if (cfg.count) extraHtml += '<div class="key-config-row"><span class="cfg-label">数量</span><span class="cfg-value">' + esc(String(cfg.count)) + '</span></div>';
        } else if (k.category === 'translation') {
          if (cfg.src) extraHtml += '<div class="key-config-row"><span class="cfg-label">源语言</span><span class="cfg-value">' + esc(cfg.src) + '</span></div>';
          if (cfg.dst) extraHtml += '<div class="key-config-row"><span class="cfg-label">目标</span><span class="cfg-value">' + esc(cfg.dst) + '</span></div>';
        }
        extraHtml += '</div>';
      }

      h += '<div class="key-card' + (k.is_active ? '' : ' disabled') + '">' +
        '<div class="key-header">' +
          '<div class="key-icon">' + CAT_ICONS[k.category] + '</div>' +
          '<div class="key-name">' + esc(k.provider_name) + '</div>' +
          '<span class="key-badge ' + (k.is_active ? 'badge-active' : 'badge-inactive') + '">' +
            (k.is_active ? '已启用' : '已禁用') + '</span>' +
        '</div>' +
        '<div class="key-field">' +
          '<div class="key-field-label">标识</div>' +
          '<div class="key-value">' + esc(k.provider_code) + '</div>' +
        '</div>' +
        (k.api_url ? '<div class="key-field"><div class="key-field-label">API 地址</div><div class="key-url">' + esc(k.api_url) + '</div></div>' : '') +
        (k.key_masked ? '<div class="key-field"><div class="key-field-label">密钥</div><div class="key-value">' + esc(k.key_masked) + '</div></div>' : '') +
        (k.description ? '<div class="key-desc">' + esc(k.description) + '</div>' : '') +
        extraHtml +
        '<div class="key-actions">' +
          '<button class="key-btn btn-edit" onclick="editKey(' + k.id + ')">编辑</button>' +
          '<button class="key-btn btn-test" onclick="testKey(' + k.id + ')">测试</button>' +
          '<button class="key-btn btn-toggle" onclick="toggleKey(' + k.id + ')">' + (k.is_active ? '禁用' : '启用') + '</button>' +
          '<button class="key-btn btn-delete" onclick="confirmDelete(' + k.id + ')">删除</button>' +
        '</div>' +
      '</div>';
    });
    // Add "Add" card
    h += '<div class="add-card" onclick="addKey()">' +
      '<div class="add-icon">➕</div>' +
      '<div class="add-text">添加' + CAT_LABELS[currentCategory] + '配置</div>' +
    '</div>';
    grid.innerHTML = h;
  }
}

// ── Category Switch ──
function switchCat(cat) {
  currentCategory = cat;
  renderCatTabs();
  loadKeys();
}

// ── Add Key ──
function addKey() {
  editKeyId = null;
  document.getElementById('modalTitle').textContent = '添加服务配置';
  document.getElementById('keyForm').reset();
  document.getElementById('fCategory').value = currentCategory;
  document.getElementById('fIsActive').checked = true;
  document.getElementById('testResult').className = 'test-result';
  document.getElementById('testResult').style.display = 'none';
  onCategoryChange();
  document.getElementById('modalBg').classList.add('open');
}

// ── Edit Key ──
async function editKey(id) {
  editKeyId = id;
  document.getElementById('modalTitle').textContent = '编辑服务配置';
  try {
    var r = await fetch('/api/provider-keys/' + id, {headers: hdr()});
    if (!r.ok) throw new Error('HTTP ' + r.status);
    var d = await r.json();
    document.getElementById('fCategory').value = d.category || 'weather';
    document.getElementById('fName').value = d.provider_name || '';
    document.getElementById('fCode').value = d.provider_code || '';
    document.getElementById('fApiUrl').value = d.api_url || '';
    document.getElementById('fDesc').value = d.description || '';
    document.getElementById('fIsActive').checked = d.is_active !== false;
    document.getElementById('fKeyValue').value = '';
    document.getElementById('fKeyValue').placeholder = d.key_masked ? '当前：' + d.key_masked + '（留空不修改）' : '输入新密钥';

    // Fill extra config fields
    var cfg = d.config || {};
    document.getElementById('fWeatherCity').value = cfg.city || '';
    document.getElementById('fWeatherUnit').value = cfg.unit || 'celsius';
    document.getElementById('fWeatherLang').value = cfg.lang || 'zh';
    document.getElementById('fNavOrigin').value = cfg.origin || '';
    document.getElementById('fNavMode').value = cfg.mode || 'driving';
    document.getElementById('fNavCoord').value = cfg.coord || 'autonavi';
    document.getElementById('fSearchEngine').value = cfg.engine || 'google';
    document.getElementById('fSearchCount').value = cfg.count || 10;
    document.getElementById('fTransSrc').value = cfg.src || 'auto';
    document.getElementById('fTransDst').value = cfg.dst || 'zh';

    onCategoryChange();
    document.getElementById('testResult').className = 'test-result';
    document.getElementById('testResult').style.display = 'none';
  } catch(e) {
    toast('加载失败：' + e.message, 'err');
    return;
  }
  document.getElementById('modalBg').classList.add('open');
}

// ── Category Change (show/hide extra fields) ──
function onCategoryChange() {
  var cat = document.getElementById('fCategory').value;
  document.getElementById('fWeatherFields').style.display = cat === 'weather' ? 'block' : 'none';
  document.getElementById('fNavFields').style.display = cat === 'navigation' ? 'block' : 'none';
  document.getElementById('fSearchFields').style.display = cat === 'search' ? 'block' : 'none';
  document.getElementById('fTransFields').style.display = cat === 'translation' ? 'block' : 'none';
}

// ── Collect extra config ──
function collectConfig() {
  var cat = document.getElementById('fCategory').value;
  var cfg = {};
  if (cat === 'weather') {
    cfg.city = document.getElementById('fWeatherCity').value.trim();
    cfg.unit = document.getElementById('fWeatherUnit').value;
    cfg.lang = document.getElementById('fWeatherLang').value;
  } else if (cat === 'navigation') {
    cfg.origin = document.getElementById('fNavOrigin').value.trim();
    cfg.mode = document.getElementById('fNavMode').value;
    cfg.coord = document.getElementById('fNavCoord').value;
  } else if (cat === 'search') {
    cfg.engine = document.getElementById('fSearchEngine').value;
    cfg.count = parseInt(document.getElementById('fSearchCount').value) || 10;
  } else if (cat === 'translation') {
    cfg.src = document.getElementById('fTransSrc').value;
    cfg.dst = document.getElementById('fTransDst').value;
  }
  // Only return non-empty config
  var hasValue = false;
  for (var k in cfg) { if (cfg[k]) { hasValue = true; break; } }
  return hasValue ? cfg : undefined;
}

// ── Save Key ──
async function saveKey() {
  var name = document.getElementById('fName').value.trim();
  var code = document.getElementById('fCode').value.trim();
  var keyValue = document.getElementById('fKeyValue').value.trim();

  if (!name || !code) { toast('请填写服务商名称和唯一标识', 'err'); return; }
  if (!editKeyId && !keyValue) { toast('请填写 API Key', 'err'); return; }

  var cat = document.getElementById('fCategory').value;
  var data = {
    provider_name: name,
    provider_code: code,
    category: cat,
    key_value: keyValue,
    api_url: document.getElementById('fApiUrl').value.trim(),
    is_active: document.getElementById('fIsActive').checked,
    description: document.getElementById('fDesc').value.trim(),
    config: collectConfig(),
  };

  try {
    var url, method;
    if (editKeyId) {
      url = '/api/provider-keys/' + editKeyId;
      method = 'PUT';
      if (!keyValue) delete data.key_value;
    } else {
      url = '/api/provider-keys';
      method = 'POST';
    }

    var r = await fetch(url, {
      method: method,
      headers: hdr(),
      body: JSON.stringify(data),
    });

    if (!r.ok) {
      var err = await r.json().catch(function() {});
      throw new Error(err && err.detail || 'HTTP ' + r.status);
    }

    toast(editKeyId ? '更新成功' : '添加成功', 'ok');
    closeModal();
    loadKeys();
    // Refresh tab counts
    renderCatTabs();
  } catch(e) {
    toast('保存失败：' + e.message, 'err');
  }
}

// ── Toggle Active ──
async function toggleKey(id) {
  try {
    var r = await fetch('/api/provider-keys/' + id + '/toggle', {method: 'PATCH', headers: hdr()});
    if (!r.ok) throw new Error('HTTP ' + r.status);
    loadKeys();
  } catch(e) {
    toast('操作失败：' + e.message, 'err');
  }
}

// ── Test Connection ──
async function testKey(id) {
  var resultEl = document.getElementById('testResult');
  resultEl.className = 'test-result';
  resultEl.style.display = 'none';
  toast('正在测试连接...', 'ok');
  try {
    var r = await fetch('/api/provider-keys/' + id + '/test', {method: 'POST', headers: hdr()});
    var d = await r.json();
    if (d.success) {
      toast('✅ ' + d.message, 'ok');
      resultEl.textContent = '✅ ' + d.message;
      resultEl.className = 'test-result ok';
      resultEl.style.display = 'block';
    } else {
      toast('❌ 测试失败：' + (d.error || '未知错误'), 'err');
      resultEl.textContent = '❌ ' + (d.error || '未知错误');
      resultEl.className = 'test-result err';
      resultEl.style.display = 'block';
    }
  } catch(e) {
    toast('测试异常：' + e.message, 'err');
    resultEl.textContent = '❌ ' + e.message;
    resultEl.className = 'test-result err';
    resultEl.style.display = 'block';
  }
}

// ── Delete ──
function confirmDelete(id) {
  if (!confirm('确定删除此配置？此操作不可恢复。')) return;
  (async function() {
    try {
      var r = await fetch('/api/provider-keys/' + id, {method: 'DELETE', headers: hdr()});
      if (!r.ok) throw new Error('HTTP ' + r.status);
      toast('已删除', 'ok');
      loadKeys();
      renderCatTabs();
    } catch(e) {
      toast('删除失败：' + e.message, 'err');
    }
  })();
}

// ── Close Modal ──
function closeModal() {
  document.getElementById('modalBg').classList.remove('open');
  editKeyId = null;
}

// ── Init ──
(async function() {
  renderCatTabs();
  await loadKeys();
})();
</script>
