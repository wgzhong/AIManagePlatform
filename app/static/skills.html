<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skills 配置 - AIManagePlatform</title>
<style>
/* ═══════════════════ Reset & Base ═══════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-deep: #0a0a1f;
  --bg-card: rgba(255, 255, 255, 0.04);
  --bg-card-hover: rgba(255, 255, 255, 0.07);
  --border-subtle: rgba(255, 255, 255, 0.08);
  --border-active: rgba(135, 232, 232, 0.4);
  --text-primary: #eef0f6;
  --text-secondary: #8888a8;
  --accent-cyan: #87e8e8;
  --accent-pink: #ffc8dd;
  --accent-green: #7ed992;
  --danger: #ff6b6b;
  --success: #5cd68a;
  --warn: #f5c842;
  --radius-lg: 16px;
  --radius-md: 12px;
  --radius-sm: 8px;
}
html, body {
  height: 100%;
}
body {
  font-family: -apple-system, "Segoe UI", PingFang SC, Microsoft YaHei, sans-serif;
  background: var(--bg-deep);
  color: var(--text-primary);
  overflow-x: hidden;
}

/* ═══════════════════ Nav ═══════════════════ */
.top-nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10, 10, 31, 0.92);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border-subtle);
  padding: 0 28px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.nav-brand {
  display: flex; align-items: center; gap: 10px;
  font-size: 18px; font-weight: 700;
  background: linear-gradient(120deg, var(--accent-cyan), var(--accent-pink));
  -webkit-background-clip: text; color: transparent;
}
.nav-links { display: flex; gap: 4px; }
.nav-link {
  padding: 7px 16px; border-radius: var(--radius-sm);
  background: transparent;
  border: none; color: var(--text-secondary);
  font-size: 13px; cursor: pointer; transition: all .2s;
}
.nav-link:hover { color: var(--text-primary); background: rgba(255,255,255,.06); }
.nav-link.active { background: rgba(135,232,232,.14); color: var(--accent-cyan); }

/* ═══════════════════ Page Container ═══════════════════ */
.page-container {
  max-width: 1440px; margin: 0 auto; padding: 24px 28px 48px;
}

/* ── Header ── */
.page-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 24px;
}
.page-header h2 {
  font-size: 20px; font-weight: 700; display: flex; align-items: center; gap: 10px;
}
.skill-count-badge {
  font-size: 11px; font-weight: 600;
  padding: 3px 10px; border-radius: 20px;
  background: rgba(135,232,232,.12); color: var(--accent-cyan);
  vertical-align: middle; margin-left: 6px;
}
.btn-add {
  padding: 9px 20px; border-radius: var(--radius-md);
  background: linear-gradient(135deg, #72e0e0, #c084fc);
  border: none; color: #111; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all .2s;
  display: flex; align-items: center; gap: 6px;
}
.btn-add:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(114,224,224,.25); }

/* ═══════════════════ MAIN LAYOUT (GRID — reliable two-column) ═══════════════════ */
.main-grid {
  display: grid;
  grid-template-columns: 360px 1fr;
  gap: 24px;
  align-items: start;
  min-height: calc(100vh - 200px);
}

/* ── Left Panel: Skill List ── */
.list-panel {
  position: sticky; top: 80px;
}
.panel-box {
  background: var(--bg-card); border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg); overflow: hidden;
}
.panel-head {
  padding: 16px 20px; border-bottom: 1px solid var(--border-subtle);
  font-size: 13px; font-weight: 600; color: var(--text-secondary);
  display: flex; align-items: center; gap: 8px;
}
.skill-list-scroll {
  max-height: calc(100vh - 240px); overflow-y: auto;
  padding: 10px;
  display: flex; flex-direction: column; gap: 6px;
}
.skill-list-scroll::-webkit-scrollbar { width: 3px; }
.skill-list-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 3px; }

/* ── Skill Card ── */
.scard {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px;
  border-radius: var(--radius-md);
  background: rgba(255,255,255,.02);
  border: 1px solid transparent;
  cursor: pointer; transition: all .2s ease;
  position: relative;
}
.scard:hover { background: var(--bg-card-hover); border-color: rgba(255,255,255,.1); }
.scard.selected {
  background: rgba(135,232,232,.07); border-color: var(--border-active);
}
.scard-icon {
  width: 40px; height: 40px; border-radius: 10px;
  background: rgba(135,232,232,.08);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
}
.scard-body { flex: 1; min-width: 0; }
.scard-name {
  font-size: 13px; font-weight: 600; color: var(--accent-cyan);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  line-height: 1.3;
}
.scard-desc {
  font-size: 11px; color: var(--text-secondary);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  line-height: 1.3; margin-top: 2px;
}
.scard-tags {
  display: flex; gap: 5px; margin-top: 5px; flex-wrap: wrap;
}
.tag {
  font-size: 9px; font-weight: 600; padding: 2px 7px; border-radius: 5px;
  letter-spacing: .3px; text-transform: uppercase;
}
.tag-cat-tool    { background: rgba(114,224,224,.1);   color: #72e0e0; }
.tag-cat-mood    { background: rgba(255,200,221,.1);   color: #ffc8dd; }
.tag-cat-custom  { background: rgba(130,210,130,.1);     color: #82d282; }
.tag-cat-other   { background: rgba(255,255,255,.06);   color: var(--text-secondary); }
.tag-on  { background: rgba(94,214,138,.1); color: var(--success); }
.tag-off { background: rgba(255,107,107,.1); color: var(--danger); }
.tag-auto{ background: rgba(245,200,66,.1);  color: var(--warn); }

/* Card action buttons */
.scard-actions {
  display: flex; flex-direction: column; gap: 4px;
  opacity: 0; transition: opacity .2s; flex-shrink: 0;
}
.scard:hover .scard-actions { opacity: 1; }
.scard-btn-del {
  width: 26px; height: 26px; border-radius: 7px;
  border: none; background: rgba(255,107,107,.08);
  color: var(--danger); font-size: 12px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.scard-btn-del:hover { background: rgba(255,107,107,.2); transform: scale(1.1); }

/* ── Right Panel: Editor ── */
.editor-panel { min-height: calc(100vh - 200px); }
.editor-panel.hidden { display: none !important; }
.editor-inner { padding: 20px; }

.editor-title-row {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: 20px;
}
.editor-skill-name {
  font-size: 17px; font-weight: 700; color: var(--text-primary);
  display: flex; align-items: center; gap: 8px;
}
.editor-skill-desc { font-size: 12px; color: var(--text-secondary); margin-top: 3px; }

/* Tabs */
.tab-bar { display: flex; gap: 6px; margin-bottom: 14px; }
.tab-btn {
  padding: 7px 16px; border-radius: var(--radius-sm);
  border: 1px solid var(--border-subtle);
  background: transparent; color: var(--text-secondary);
  font-size: 12px; font-weight: 500; cursor: pointer; transition: all .15s;
}
.tab-btn:hover { border-color: rgba(255,255,255,.15); color: var(--text-primary); }
.tab-btn.active { background: rgba(135,232,232,.1); border-color: var(--accent-cyan); color: var(--accent-cyan); }

/* Textarea editor */
.code-editor {
  width: 100%; min-height: 340px;
  padding: 16px; border-radius: var(--radius-md);
  background: rgba(0,0,0,.35); border: 1px solid var(--border-subtle);
  color: var(--text-primary); font-size: 13px;
  font-family: "Cascadia Code", "Fira Code", Consolas, monospace;
  line-height: 1.65; resize: vertical;
  transition: border-color .2s;
}
.code-editor:focus { outline: none; border-color: var(--accent-cyan); }

.file-meta {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 10px; padding: 8px 12px;
  background: rgba(0,0,0,.2); border-radius: var(--radius-sm);
  font-size: 11px; color: var(--text-secondary);
}
.file-meta-path { font-family: monospace; word-break: break-all; }
.status-dot { padding: 2px 9px; border-radius: 5px; font-weight: 500; }
.status-dot.saved { background: rgba(94,214,138,.12); color: var(--success); }
.status-dot.default { background: rgba(255,200,221,.12); color: var(--accent-pink); }

/* Action button row */
.action-row { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
.btn {
  padding: 8px 16px; border-radius: var(--radius-sm);
  border: 1px solid transparent; font-size: 12px; font-weight: 500;
  cursor: pointer; display: inline-flex; align-items: center; gap: 5px;
  transition: all .15s;
}
.btn-primary {
  background: linear-gradient(135deg, #72e0e0, #a78bfa);
  color: #111; font-weight: 600;
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(114,224,224,.2); }
.btn-outline {
  background: transparent; border-color: var(--border-subtle); color: var(--text-secondary);
}
.btn-outline:hover { background: rgba(255,255,255,.06); color: var(--text-primary); }
.btn-danger {
  background: transparent; border-color: rgba(255,107,107,.25); color: var(--danger);
}
.btn-danger:hover { background: rgba(255,107,107,.12); }
.btn-accent {
  background: transparent; border-color: rgba(135,232,232,.25); color: var(--accent-cyan);
}
.btn-accent:hover { background: rgba(135,232,232,.08); }

/* Config section inside editor */
.config-block {
  margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border-subtle);
}
.config-block-title { font-size: 14px; font-weight: 600; margin-bottom: 14px; }
.config-toggles { display: flex; gap: 12px; margin-bottom: 16px; }
.cfg-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px; background: rgba(0,0,0,.18); border-radius: var(--radius-sm);
}
/* Toggle switch */
.tog {
  position: relative; width: 40px; height: 23px;
  background: rgba(255,255,255,.1); border-radius: 12px;
  cursor: pointer; flex-shrink: 0; transition: background .25s;
}
.tog.on { background: var(--accent-cyan); }
.tog::after {
  content: ''; position: absolute; width: 19px; height: 19px;
  background: #fff; border-radius: 50%; top: 2px; left: 2px;
  transition: transform .25s cubic-bezier(.4,2,.2,1);
  box-shadow: 0 1px 3px rgba(0,0,0,.3);
}
.tog.on::after { transform: translateX(17px); }
.cfg-label { font-size: 12px; color: var(--text-secondary); font-weight: 500; }

.kw-section-title { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; }
.kw-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
.kw-chip {
  padding: 4px 11px; border-radius: 6px; font-size: 11px;
  background: rgba(135,232,232,.09); color: var(--accent-cyan);
  display: inline-flex; align-items: center; gap: 5px;
}
.kw-x { cursor: pointer; opacity: .45; font-size: 13px; }
.kw-x:hover { opacity: 1; color: var(--danger); }
.kw-input {
  width: 100%; padding: 9px 12px; border-radius: var(--radius-sm);
  background: rgba(0,0,0,.28); border: 1px solid var(--border-subtle);
  color: var(--text-primary); font-size: 12px; outline: none; transition: border-color .15s;
}
.kw-input:focus { border-color: var(--accent-cyan); }
.kw-input::placeholder { color: rgba(255,255,255,.15); }

/* Empty state */
.empty-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 60px 20px; text-align: center;
}
.empty-icon { font-size: 48px; opacity: .35; margin-bottom: 12px; }
.empty-text { font-size: 14px; color: var(--text-secondary); }

/* ═══════════════════ Modal ═══════════════════ */
.modal-bg {
  position: fixed; inset: 0; z-index: 2000;
  background: rgba(0,0,0,.65); backdrop-filter: blur(8px);
  display: none; justify-content: center; align-items: center;
}
.modal-bg.open { display: flex; }
.modal-win {
  background: #13132e; border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg); width: 520px; max-width: 90vw;
  max-height: 85vh; overflow-y: auto;
  box-shadow: 0 30px 80px rgba(0,0,0,.5);
  animation: modalIn .25s ease;
}
@keyframes modalIn { from { opacity:0; transform: translateY(16px) scale(.97); } to { opacity:1; transform:none; } }
.modal-head {
  display: flex; justify-content: space-between; align-items: center;
  padding: 20px 24px 0;
}
.modal-head h3 { font-size: 17px; font-weight: 600; }
.modal-close-btn {
  width: 30px; height: 30px; border-radius: 50%;
  border: none; background: rgba(255,255,255,.06); color: var(--text-secondary);
  font-size: 18px; cursor: pointer;
}
.modal-close-btn:hover { background: rgba(255,255,255,.12); color: var(--text-primary); }
.modal-body { padding: 16px 24px 24px; }
.fg { margin-bottom: 14px; }
.fg label { display: block; font-size: 11px; font-weight: 600; color: var(--text-secondary); margin-bottom: 5px; text-transform: uppercase; letter-spacing:.3px;}
.fi {
  width: 100%; padding: 9px 12px; border-radius: var(--radius-sm);
  background: rgba(0,0,0,.28); border: 1px solid var(--border-subtle);
  color: var(--text-primary); font-size: 13px; outline: none; font-family: inherit;
  transition: border-color .15s;
}
.fi:focus { border-color: var(--accent-cyan); }
textarea.fi { min-height: 100px; font-family: "Cascadia Code","Fira Code",Consolas,monospace; line-height: 1.55; resize: vertical; }
select.fi { appearance: none; cursor: pointer; }
.fg-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.chk-row { display: flex; gap: 10px; }
.chk-item { display: flex; align-items: center; gap: 8px; padding: 9px 14px; background: rgba(0,0,0,.15); border-radius: var(--radius-sm); }
.chk-item input[type=checkbox] { accent-color: var(--accent-cyan); cursor: pointer; }
.chk-item label { font-size: 12px; color: var(--text-primary); cursor: pointer; }
.modal-foot {
  display: flex; justify-content: flex-end; gap: 8px;
  padding-top: 16px; border-top: 1px solid var(--border-subtle);
  margin-top: 4px;
}

/* Confirm dialog */
.confirm-bg {
  position: fixed; inset: 0; z-index: 2500;
  background: rgba(0,0,0,.65); backdrop-filter: blur(8px);
  display: none; justify-content: center; align-items: center;
}
.confirm-bg.open { display: flex; }
.confirm-box {
  background: #13132e; border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg); padding: 28px 32px; width: 400px; max-width: 90vw;
  box-shadow: 0 20px 60px rgba(0,0,0,.5);
  animation: modalIn .25s ease;
}
.confirm-box h3 { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
.confirm-box p { font-size: 13px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 20px; }
.confirm-btns { display: flex; justify-content: flex-end; gap: 8px; }

/* Toast notification */
.toast {
  position: fixed; bottom: 20px; right: 20px; z-index: 3000;
  padding: 10px 20px; border-radius: var(--radius-md);
  font-size: 13px; font-weight: 500;
  animation: toastIn .3s ease; box-shadow: 0 8px 24px rgba(0,0,0,.3);
}
.toast-ok { background: rgba(94,214,138,.92); color: #fff; }
.toast-err { background: rgba(255,107,107,.92); color: #fff; }
@keyframes toastIn { from { transform: translateX(40px); opacity: 0; } to { transform: none; opacity: 1; } }

/* Responsive */
@media (max-width: 900px) {
  .main-grid { grid-template-columns: 1fr; }
  .list-panel { position: static; }
  .skill-list-scroll { max-height: 380px; }
  .config-toggles { flex-direction: column; }
  .fg-row { grid-template-columns: 1fr; }
}
/* ═════════════════ Contribute Toggle ═════════════════ */
.contrib-row {
  margin: 6px 0 4px;
  padding: 6px 12px;
  background: rgba(135,232,232,0.06);
  border-radius: 8px;
}
.contrib-label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--text-secondary);
  cursor: pointer;
  user-select: none;
}
.contrib-label input[type="checkbox"] {
  accent-color: var(--accent-cyan);
  width: 16px;
  height: 16px;
  cursor: pointer;
}

/* private skill badge */
.tag-private {
  background: rgba(124, 77, 255, 0.15) !important;
  color: #a78bfa !important;
  font-size: 11px;
}
</style>
</head>
<body>

<!-- ══ NAV ══ -->
<nav class="top-nav">
  <div class="nav-brand">🧠 AIManagePlatform</div>
  <div class="nav-links">
    <button class="nav-link" onclick="go('/')">首页</button>
    <button class="nav-link" onclick="go('/chat')">聊天</button>
    <button class="nav-link" onclick="go('/devices')">设备管理</button>
    <button class="nav-link active">Skills 配置</button>
  </div>
</nav>

<!-- ══ PAGE ══ -->
<div class="page-container">

<div class="page-header">
  <h2>🧠 技能配置中心<span class="skill-count-badge" id="countBadge">0 个技能</span></h2>
  <button class="btn-add" onclick="openCreateModal()">＋ 添加自定义技能</button>
</div>

<!-- ══ GRID LAYOUT ══ -->
<div class="main-grid">

  <!-- LEFT: Skill List -->
  <div class="list-panel">
    <div class="panel-box">
      <div class="panel-head">📋 技能列表</div>
      <div class="skill-list-scroll" id="skillListEl">
        <div class="empty-state"><div class="empty-icon">⏳</div><div class="empty-text">加载中...</div></div>
      </div>
    </div>
  </div>

  <!-- RIGHT: Editor -->
  <div class="editor-panel" id="editorPanel">
    <div class="panel-box editor-inner">
      <div class="editor-title-row">
        <div>
          <div class="editor-skill-name" id="edName"></div>
          <div class="editor-skill-desc" id="edDesc"></div>
        </div>

        <!-- 贡献开关（仅私人技能显示） -->
        <div class="contrib-row" id="contribRow" style="display:none;">
          <label class="contrib-label">
            <input type="checkbox" id="contribCheck" onchange="toggleContrib()">
            <span>🌍 贡献到全局技能库（其他用户可见）</span>
          </label>
        </div>
      </div>

      <div class="tab-bar">
        <button class="tab-btn active" id="tabPrompt" onclick="switchTab('prompt')">✏️ System Prompt</button>
        <button class="tab-btn" id="tabRaw" onclick="switchTab('raw')">📄 Raw MD 完整文件</button>
      </div>

      <textarea class="code-editor" id="taPrompt" placeholder="选择一个技能后，其 System Prompt 将显示在这里..."></textarea>
      <textarea class="code-editor" id="taRaw" style="display:none;min-height:420px;" placeholder="加载中..."></textarea>

      <div class="file-meta">
        <span class="file-meta-path" id="filePath">—</span>
        <span class="status-dot default" id="fileStatus">默认值</span>
      </div>

      <div class="action-row">
        <button class="btn btn-primary" onclick="savePrompt()">💾 保存 Prompt</button>
        <button class="btn btn-accent" id="btnSaveRaw" style="display:none;" onclick="saveRaw()">📄 保存 Raw MD</button>
        <button class="btn btn-outline" onclick="resetPrompt()">↩ 重置</button>
        <button class="btn btn-danger" onclick="confirmDel(currentSkill?.name)">🗑️ 删除此技能</button>
      </div>

      <!-- Config Section -->
      <div class="config-block">
        <div class="config-block-title">⚙️ 技能配置</div>
        <div class="config-toggles">
          <div class="cfg-item"><div class="tog" id="togEn" onclick="flipEn()"></div><span class="cfg-label">启用</span></div>
          <div class="cfg-item"><div class="tog" id="togAuto" onclick="flipAuto()"></div><span class="cfg-label">自动触发</span></div>
        </div>
        <div class="kw-section-title">🔑 触发关键词</div>
        <div class="kw-list" id="kwList"></div>
        <input class="kw-input" id="kwInput" placeholder="输入关键词后按 Enter 添加" onkeydown="addKw(event)">
      </div>

      <div class="action-row" style="margin-top:20px;">
        <button class="btn btn-primary" onclick="saveConfig()">✅ 保存所有配置</button>
      </div>
    </div>
  </div>

  <!-- RIGHT: Empty State (shown when no skill selected) -->
  <div class="editor-panel" id="emptyPanel">
    <div class="panel-box empty-state">
      <div class="empty-icon">👈</div>
      <div class="empty-text">从左侧列表选择一个技能进行查看和编辑</div>
    </div>
  </div>

</div><!-- /grid -->
</div><!-- /container -->

<!-- ══ CREATE MODAL ══ -->
<div class="modal-bg" id="createModal" onclick="closeCreateModal(event)">
  <div class="modal-win" onclick="event.stopPropagation()">
    <div class="modal-head">
      <h3>🛠️ 添加自定义技能</h3>
      <button class="modal-close-btn" onclick="closeCreateModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="fg"><label>技能名称 *</label><input class="fi" id="cName" placeholder="英文/数字/下划线/连字符"></div>
      <div class="fg"><label>描述 *</label><input class="fi" id="cDesc" placeholder="简要描述功能"></div>
      <div class="fg-row">
        <div class="fg"><label>图标 Emoji</label><input class="fi" id="cIcon" value="🔧" maxlength="4"></div>
        <div class="fg"><label>分类</label>
          <select class="fi" id="cCat">
            <option value="自定义">自定义</option><option value="工具">工具</option>
            <option value="情感响应">情感响应</option><option value="其他">其他</option>
          </select>
        </div>
      </div>
      <div class="fg"><label>System Prompt</label><textarea class="fi" id="cPrompt" placeholder="编写技能的 system prompt..."></textarea></div>
      <div class="chk-row fg">
        <div class="chk-item"><input type="checkbox" id="cOn" checked><label>启用</label></div>
        <div class="chk-item"><input type="checkbox" id="cAuto"><label>自动触发</label></div>
        <div class="chk-item"><input type="checkbox" id="cContrib"><label>🌍 同时贡献到全局技能库</label></div>
      </div>
      <div class="fg">
        <label>触发关键词</label>
        <div style="display:flex;gap:8px;margin-bottom:6px;">
          <input class="fi" id="cKwIn" placeholder="关键词" style="flex:1">
          <button class="btn btn-outline" onclick="addCKw()" style="padding:8px 14px;">添加</button>
        </div>
        <div class="kw-list" id="cKwList"></div>
      </div>
    </div>
    <div class="modal-foot modal-body" style="padding-top:0;padding-bottom:0;">
      <button class="btn btn-outline" onclick="closeCreateModal()">取消</button>
      <button class="btn btn-primary" onclick="doCreate()">✅ 创建</button>
    </div>
  </div>
</div>

<!-- ══ DELETE CONFIRM ══ -->
<div class="confirm-bg" id="delConfirmBg" onclick="closeDelConfirm(event)">
  <div class="confirm-box" onclick="event.stopPropagation()">
    <h3>🗑️ 确认删除技能</h3>
    <p id="delConfirmMsg">确定要删除这个技能吗？此操作不可恢复。</p>
    <div class="confirm-btns">
      <button class="btn btn-outline" onclick="closeDelConfirm()">取消</button>
      <button class="btn btn-danger" id="delConfirmOkBtn">确认删除</button>
    </div>
  </div>
</div>

<script>
// ─── State ───
let skills = [];
let cur = null;       // currently selected skill object
let original = {};    // original prompt for reset
let cKeywords = [];   // create-modal keywords

// ─── Auth ───
function hdr() {
  const t = localStorage.getItem('access_token');
  if (!t) return {'Content-Type':'application/json'};
  return {'Authorization':'Bearer '+t, 'Content-Type':'application/json'};
}
async function auth() {
  const t = localStorage.getItem('access_token');
  if (!t) { location.href='/login'; return; }
  try { const r = await fetch('/auth/me',{headers:{'Authorization':`Bearer ${t}`}}); if (!r.ok) throw 0; }
  catch { localStorage.removeItem('access_token'); location.href='/login'; }
}

// ─── Load Skills ───
let allSkills = [];      // 全局 + 私人合并列表（供渲染用）
let privateSkills = [];  // 私人技能单独缓存

async function loadSkills() {
  try {
    // 使用 merged 接口：全局技能 + 当前用户私人技能
    const r = await fetch('/api/skills/merged', { headers: hdr() });
    const d = await r.json();
    skills = d.skills || [];
    document.getElementById('countBadge').textContent = skills.length + ' 个技能';
    renderList();
  } catch (e) {
    console.error(e);
    document.getElementById('skillListEl').innerHTML =
      '<div class="empty-state"><div class="empty-icon">❌</div><div class="empty-text">加载失败</div></div>';
  }
}

function tagCatClass(cat) {
  const m = {'工具':'tag-cat-tool','情感响应':'tag-cat-mood','自定义':'tag-cat-custom'};
  return m[cat] || 'tag-cat-other';
}

function renderList() {
  const el = document.getElementById('skillListEl');
  if (!skills.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">暂无技能</div></div>';
    return;
  }
  el.innerHTML = skills.map(s => `
    <div class="scard${cur && cur.name===s.name ? ' selected' : ''}" onclick="pick('${s.name}')">
      <div class="scard-icon">${esc(s.icon||'🔧')}</div>
      <div class="scard-body">
        <div class="scard-name">${esc(s.name)}</div>
        <div class="scard-desc">${esc(s.description||'')}</div>
        <div class="scard-tags">
          <span class="tag ${tagCatClass(s.category)}">${esc(s.category||'通用')}</span>
          ${s.source==='private' ? '<span class="tag tag-private">🔒 私人</span>' : ''}
          ${s.is_contributed ? '<span class="tag" style="background:rgba(135,232,232,0.12);color:var(--accent-cyan);">🌍 已贡献</span>' : ''}
          <span class="tag ${s.enabled?'tag-on':'tag-off'}">${s.enabled?'ON':'OFF'}</span>
          ${s.auto_trigger ? '<span class="tag tag-auto">AUTO</span>' : ''}
        </div>
      </div>
      <div class="scard-actions">
        <button class="scard-btn-del" onclick="event.stopPropagation(); confirmDel('${esc(s.name)}')" title="删除此技能">✕</button>
      </div>
    </div>
  `).join('');
}

function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

// ─── Parse MD frontmatter (helper) ───
function parseMdFrontmatter(content) {
  const result = { description:'', category:'自定义', icon:'🔧', enabled:true, auto_trigger:false, trigger_keywords:[], system_prompt:'' };
  if (!content || !content.startsWith('---')) return result;
  const parts = content.split('---', 2);
  if (parts.length < 3) return result;
  const fm = parts[1];
  result.system_prompt = parts[2].trim();
  for (const line of fm.split('\n')) {
    const s = line.trim();
    if (!s || s.startsWith('#')) continue;
    const idx = s.indexOf(':');
    if (idx < 0) continue;
    const key = s.substring(0, idx).trim();
    let val = s.substring(idx + 1).trim();
    if (key === 'description') result.description = val;
    else if (key === 'category') result.category = val;
    else if (key === 'icon') result.icon = val;
    else if (key === 'enabled') result.enabled = val.toLowerCase() === 'true';
    else if (key === 'auto_trigger') result.auto_trigger = val.toLowerCase() === 'true';
    else if (key === 'trigger_keywords') {
      try { result.trigger_keywords = JSON.parse(val); } catch {}
    }
  }
  return result;
}

// ─── Contribute Toggle ───
async function toggleContrib() {
  if (!cur || cur.source !== 'private') return;
  const doContrib = document.getElementById('contribCheck').checked;
  const name = cur.name;
  try {
    const url = `/api/user-skills/${name}/contribute`;
    const method = doContrib ? 'POST' : 'DELETE';
    const r = await fetch(url, { method, headers: hdr() });
    const d = await r.json().catch(() => ({}));
    if (r.ok) {
      toast(d.message || (doContrib ? '✅ 已贡献到全局技能库' : '✅ 已取消贡献'), 'ok');
      await loadSkills();
      pick(name);
    } else {
      toast(d.detail || '操作失败', 'err');
      document.getElementById('contribCheck').checked = !doContrib;
    }
  } catch (e) {
    toast('❌ ' + e.message, 'err');
    document.getElementById('contribCheck').checked = !doContrib;
  }
}

// ─── Select / Load Skill ───
async function pick(name) {
  const s = skills.find(x => x.name === name);
  if (!s) return;
  cur = s;
  // 追踪来源（global / private），供后续保存/删除时使用
  cur.source = s.source || 'global';

  // Show editor, hide empty
  document.getElementById('editorPanel').classList.remove('hidden');
  document.getElementById('emptyPanel').style.display = 'none';

  // Header info
  document.getElementById('edName').textContent = (s.icon||'🔧') + '  ' + s.name;
  document.getElementById('edDesc').textContent = s.description || '';

  // Contribute 开关（仅私人技能显示）
  const contribRow = document.getElementById('contribRow');
  const contribCheck = document.getElementById('contribCheck');
  if (cur.source === 'private') {
    contribRow.style.display = '';
    contribCheck.checked = !!s.is_contributed;
  } else {
    contribRow.style.display = 'none';
  }

  // Toggles
  setTog('togEn', s.enabled);
  setTog('togAuto', s.auto_trigger);

  // Keywords
  renderKw(s.trigger_keywords || []);

  // Load prompt — 私人技能无独立 system-prompt 端点，改用 raw-md
  if (cur.source === 'private') {
    // 私人技能：直接加载 raw-md（含完整 frontmatter）
    await loadRawMd(name);
    // 同时从 raw-md 解析出 system_prompt 填入 prompt 编辑区
    try {
      const r = await fetch(`/api/user-skills/${name}/raw-md`, { headers: hdr() });
      if (r.ok) {
        const d = await r.json();
        const parsed = parseMdFrontmatter(d.raw_content || '');
        original.system_prompt = parsed.system_prompt || '';
        document.getElementById('taPrompt').value = parsed.system_prompt || '';
      }
    } catch {}
    document.getElementById('filePath').textContent = '(私人技能，仅存数据库)';
    const st = document.getElementById('fileStatus');
    st.className = 'status-dot saved';
    st.textContent = '已保存到数据库';
  } else {
    // 全局技能：原有逻辑
    try {
      const r = await fetch(`/api/skills/${name}/system-prompt`, { headers: hdr() });
      if (!r.ok) throw new Error(r.status);
      const pd = await r.json();
      original.system_prompt = pd.system_prompt || '';
      document.getElementById('taPrompt').value = pd.system_prompt || '';
      const hasMd = pd.has_md_files?.system_prompt;
      const st = document.getElementById('fileStatus');
      st.className = 'status-dot ' + (hasMd ? 'saved' : 'default');
      st.textContent = hasMd ? '已保存到 MD' : '默认值';

      try {
        const fr = await fetch(`/api/skills/${name}/file-path`, { headers: hdr() });
        if (fr.ok) { const fd = await fr.json(); cur._dir = fd.skill_dir; }
      } catch {}
      document.getElementById('filePath').textContent = (cur._dir || `skills/${s.category}/${s.name}`) + '/skill.md';
    } catch (e) {
      console.error('load prompt err:', e);
      toast('加载失败: '+e.message,'err');
    }

    // Load raw md
    await loadRawMd(name);
  }

  renderList();
}

async function loadRawMd(name) {
  const el = document.getElementById('taRaw');
  try {
    const r = await fetch(`/api/skills/${name}/raw-md`, { headers: hdr() });
    if (r.ok) {
      const d = await r.json();
      el.value = d.raw_content || '';
      cur._hasMd = !!d.raw_content;
    } else {
      el.value = '// 该技能为内建 Python 技能，无 skill.md 文件可编辑';
      cur._hasMd = false;
    }
  } catch { el.value = '// 加载失败'; }
}

// ─── Tab Switching ───
function switchTab(which) {
  const taP = document.getElementById('taPrompt'), taR = document.getElementById('taRaw');
  const tP = document.getElementById('tabPrompt'), tR = document.getElementById('tabRaw');
  const bR = document.getElementById('btnSaveRaw');
  if (which === 'raw') {
    taP.style.display='none'; taR.style.display='block';
    tP.classList.remove('active'); tR.classList.add('active');
    bR.style.display='';
  } else {
    taP.style.display='block'; taR.style.display='none';
    tP.classList.add('active'); tR.classList.remove('active');
    bR.style.display='none';
  }
}

// ─── Toggles ───
function setTog(id,on){ document.getElementById(id).classList.toggle('on',!!on); }
function flipEn(){ if(cur){cur.enabled=!cur.enabled;setTog('togEn',cur.enabled);} }
function flipAuto(){ if(cur){cur.auto_trigger=!cur.auto_trigger;setTog('togAuto',cur.auto_trigger);} }

// ─── Keywords ───
function renderKw(arr){
  document.getElementById('kwList').innerHTML = arr.map((k,i)=>
    `<span class="kw-chip">${esc(k)}<span class="kw-x" onclick="rmKw(${i})">×</span></span>`
  ).join('');
}
function addKw(ev){
  if(ev.key==='Enter'){
    const v=document.getElementById('kwInput').value.trim();
    if(v&&cur){
      if(!cur.trigger_keywords) cur.trigger_keywords=[];
      if(!cur.trigger_keywords.includes(v)){cur.trigger_keywords.push(v);renderKw(cur.trigger_keywords);}
      document.getElementById('kwInput').value='';
    }
  }
}
function rmKw(i){if(cur?.trigger_keywords){cur.trigger_keywords.splice(i,1);renderKw(cur.trigger_keywords);}}

// ─── Save ───
async function savePrompt(){
  if(!cur)return;
  const content=document.getElementById('taPrompt').value;
  const isPrivate = cur.source === 'private';
  const url = isPrivate
    ? `/api/user-skills/${cur.name}`
    : `/api/skills/${cur.name}/system-prompt`;
  const method = isPrivate ? 'PUT' : 'POST';
  const body = isPrivate
    ? JSON.stringify({system_prompt: content})
    : JSON.stringify({content});
  try{
    const r=await fetch(url,{method,headers:hdr(),body});
    if(r.ok){
      toast('✅ Prompt 已保存','ok');
      if(!isPrivate){
        document.getElementById('fileStatus').className='status-dot saved';
        document.getElementById('fileStatus').textContent='已保存到 MD';
      }
    } else {
      const d=await r.json().catch(()=>({}));
      toast('❌ 保存失败: '+(d.detail||r.status),'err');
    }
  }catch(e){toast('❌ '+e.message,'err');}
}
function resetPrompt(){document.getElementById('taPrompt').value=original.system_prompt||'';}

async function saveRaw(){
  if(!cur)return;
  const content=document.getElementById('taRaw').value;
  const isPrivate=cur.source==='private';
  const url=isPrivate
    ? `/api/user-skills/${cur.name}/raw-md`
    : `/api/skills/${cur.name}/raw-md`;
  try{
    const r=await fetch(url,{method:'POST',headers:hdr(),body:JSON.stringify({content})});
    const d=await r.json().catch(()=>({}));
    if(r.ok)toast(d.message||'✅ 已保存','ok');else toast(d.detail||'❌ 失败','err');
  }catch(e){toast('❌ '+e.message,'err');}
}

async function saveConfig(){
  if(!cur)return;
  const isPrivate=cur.source==='private';
  // 保存配置（enabled/auto_trigger/trigger_keywords）
  const cfgBody=JSON.stringify({enabled:cur.enabled,auto_trigger:cur.auto_trigger,trigger_keywords:cur.trigger_keywords});
  const cfgUrl=isPrivate
    ? `/api/user-skills/${cur.name}`
    : `/api/skills/${cur.name}/config`;
  const cfgMethod=isPrivate?'PUT':'POST';
  try{
    const r=await fetch(cfgUrl,{method:cfgMethod,headers:hdr(),body:cfgBody});
    if(r.ok){
      toast('✅ 配置已保存','ok');
      // 同时保存 Prompt（如果是全局技能，已有 savePrompt 逻辑）
      if(!isPrivate) await savePrompt();
    }else{
      const d=await r.json().catch(()=>({}));
      toast('❌ 保存失败: '+(d.detail||r.status),'err');
    }
  }catch(e){toast('❌ '+e.message,'err');}
}

// ─── Delete ───
let delTarget=null;
let delTargetSource='global';  // 记录待删除技能的来源
function confirmDel(name){
  delTarget=name||null;
  // 查找来源
  const s=skills.find(x=>x.name===name);
  delTargetSource=s?.source||'global';
  document.getElementById('delConfirmMsg').textContent=
    `确定要删除技能「${name||cur?.name||''}」吗？${delTargetSource==='private'?'（私人技能，仅从你的账户删除）':'将永久删除该技能的文件和配置。'}`;
  document.getElementById('delConfirmBg').classList.add('open');
}
function closeDelConfirm(ev){if(ev&&ev.target!==document.getElementById('delConfirmBg'))return;document.getElementById('delConfirmBg').classList.remove('open');delTarget=null;}

document.getElementById('delConfirmOkBtn').addEventListener('click', async ()=>{
  if(!delTarget)return;
  const isPrivate=delTargetSource==='private';
  const url=isPrivate?`/api/user-skills/${delTarget}`:`/api/skills/${delTarget}`;
  try{
    const r=await fetch(url,{method:'DELETE',headers:hdr()});
    const d=await r.json().catch(()=>({}));
    if(r.ok){
      toast(d.message||'已删除','ok');
      closeDelConfirm();
      if(cur?.name===delTarget){
        cur=null;
        document.getElementById('editorPanel').classList.add('hidden');
        document.getElementById('emptyPanel').style.display='';
      }
      await loadSkills();
    }else toast(d.detail||d.message||'❌ 删除失败','err');
  }catch(e){toast('❌ '+e.message,'err');}
});

// ─── Create Modal ───
function openCreateModal(){
  document.getElementById('createModal').classList.add('open');
  document.getElementById('cName').value='';
  document.getElementById('cDesc').value='';
  document.getElementById('cIcon').value='🔧';
  document.getElementById('cCat').value='自定义';
  document.getElementById('cPrompt').value='';
  document.getElementById('cOn').checked=true;
  document.getElementById('cAuto').checked=false;
  cKeywords=[];renderCKw();
}
function closeCreateModal(ev){if(ev&&ev.target!==document.getElementById('createModal'))return;document.getElementById('createModal').classList.remove('open');}
function renderCKw(){document.getElementById('cKwList').innerHTML=cKeywords.map((k,i)=>`<span class="kw-chip">${esc(k)}<span class="kw-x" onclick="rmCKw(${i})">×</span></span>`).join('');}
function addCKw(){const v=document.getElementById('cKwIn').value.trim();if(v&&!cKeywords.includes(v)){cKeywords.push(v);renderCKw();}document.getElementById('cKwIn').value='';document.getElementById('cKwIn').focus();}
function rmCKw(i){cKeywords.splice(i,1);renderCKw();}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&e.target.id==='cKwIn'){e.preventDefault();addCKw();}});

async function doCreate(){
  const name=document.getElementById('cName').value.trim();
  const desc=document.getElementById('cDesc').value.trim();
  const icon=document.getElementById('cIcon').value.trim()||'🔧';
  const cat=document.getElementById('cCat').value;
  const prompt=document.getElementById('cPrompt').value.trim();
  const en=document.getElementById('cOn').checked;
  const auto=document.getElementById('cAuto').checked;
  const doContrib=document.getElementById('cContrib').checked;
  if(!name){toast('请输入技能名称','err');return;}
  if(!desc){toast('请输入描述','err');return;}
  try{
    // 始终先创建私人技能，若勾选贡献则同时贡献
    const r=await fetch(`/api/user-skills?contribute=${doContrib}`,{method:'POST',headers:hdr(),
      body:JSON.stringify({name,description:desc,icon,category:cat,system_prompt:prompt,enabled:en,auto_trigger:auto,trigger_keywords:cKeywords})});
    const d=await r.json().catch(()=>({}));
    if(r.ok){toast(d.message||'✅ 创建成功','ok');closeCreateModal();await loadSkills();}
    else toast(d.detail||d.message||'❌ 创建失败','err');
  }catch(e){toast('❌ '+e.message,'err');}
}

// ─── Toast ───
function toast(msg,type){
  const el=document.createElement('div');el.className=`toast toast-${type||'ok'}`;el.textContent=msg;
  document.body.appendChild(el);setTimeout(()=>{el.style.opacity='0';el.transition='opacity .3s';},2200);setTimeout(()=>el.remove(),2600);
}

// ─── Navigation ───
function go(p){location.href=p;}

// ─── Init ───
document.addEventListener('DOMContentLoaded',async()=>{await auth();loadSkills();});
</script>
</body>
</html>
