<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>连接模型 — AIManagePlatform</title>
<style>
/* ═════════════════════════════════════════
   模型管理 — Open WebUI 风格 (精致美化版)
   ═════════════════════════════════════════ */
:root {
  --bg: #eef1f5;
  --card-bg: rgba(255,255,255,.82);
  --card-border: rgba(255,255,255,.5);
  --input-bg: #fff;
  --text: #1a1f36;
  --text-secondary: #556274;
  --text-muted: #94a3b8;
  --accent: #6366f1;
  --accent-2: #8b5cf6;
  --accent-light: #eef2ff;
  --danger: #f43f5e;
  --success: #10b981;
  --radius: 16px;
  --radius-sm: 10px;
}
* { box-sizing:border-box; margin:0; padding:0; }

body {
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",system-ui,sans-serif;
  background:var(--bg); color:var(--text);
  min-height:100vh; line-height:1.55; font-size:14px;
  /* 渐变背景 + 噪点纹理 */
  background-image:
    radial-gradient(ellipse at 20% -10%, rgba(99,102,241,.12) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 110%, rgba(139,92,246,.1) 0%, transparent 50%),
    linear-gradient(180deg, #f0f2f7 0%, #e8ecf2 100%);
  background-attachment: fixed;
}

/* ── Top Nav ── */
.top-nav {
  position:sticky; top:0; z-index:100;
  background:rgba(255,255,255,.72); backdrop-filter:saturate(180%) blur(16px);
  border-bottom:1px solid rgba(226,232,240,.6);
  padding:0 28px; height:54px; display:flex; align-items:center; gap:14px;
}
.nav-brand { display:flex; align-items:center; gap:9px; text-decoration:none; color:inherit; }
.nav-brand .logo { font-size:17px; font-weight:700; background:linear-gradient(135deg,var(--accent), var(--accent-2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.nav-tag { font-size:11px; padding:2px 8px; border-radius:6px; background:linear-gradient(135deg,rgba(99,102,241,.12), rgba(139,92,246,.12)); color:var(--accent); font-weight:600; letter-spacing:.3px; }
.nav-spacer { flex:1; }
.nav-link { color:var(--text-secondary); text-decoration:none; font-size:13px; padding:6px 14px; border-radius:8px; transition:all .18s; }
.nav-link:hover { background:rgba(99,102,241,.08); color:var(--accent); }

/* ── Page ── */
.page-wrap { max-width:1140px; margin:0 auto; padding:32px 28px 90px; }

/* Hero Header */
.page-header {
  text-align:center; margin-bottom:40px; position:relative;
}
.page-title {
  font-size:28px; font-weight:800; letter-spacing:-.4px;
  background:linear-gradient(135deg, #1a1f36 0%, #4338ca 50%, #7c3aed 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  line-height:1.3;
}
.page-desc {
  color:var(--text-secondary); font-size:14px; margin-top:8px; font-weight:400;
}

/* ── Provider Card Grid ── */
.p-grid {
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(195px, 1fr));
  gap:16px;
}

.p-card {
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px;
  padding:26px 16px 22px; cursor:pointer; transition:all .25s cubic-bezier(.4,0,.2,1);
  background:var(--card-bg);
  border:1.5px solid rgba(226,232,240,.7);
  border-radius:18px;
  user-select:none; position:relative;
  backdrop-filter:saturate(140%) blur(8px);
  box-shadow:
    0 1px 3px rgba(0,0,0,.04),
    0 4px 16px rgba(0,0,0,.03);
}
.p-card:hover {
  border-color:rgba(99,102,241,.35);
  background:rgba(255,255,255,.95);
  transform:translateY(-4px) scale(1.02);
  box-shadow:
    0 8px 30px rgba(99,102,241,.12),
    0 2px 8px rgba(0,0,0,.04);
}
.p-card:active { transform:scale(.98) translateY(0); transition-duration:.08s; }

/* active 状态 */
.p-card.active {
  border-color:var(--accent);
  background:linear-gradient(180deg, rgba(99,102,241,.06), rgba(139,92,246,.06));
  box-shadow:
    0 0 0 1px var(--accent),
    0 8px 32px rgba(99,102,241,.18),
    0 2px 8px rgba(0,0,0,.04);
}

/* 已配置绿色圆点 */
.p-card.has-key::after {
  content:''; width:11px; height:11px; border-radius:50%; background:linear-gradient(135deg,#34d399,#10b981);
  position:absolute; top:13px; right:13px;
  box-shadow:0 0 8px rgba(16,185,129,.45);
  animation:pulse-dot 2s ease-in-out infinite;
}
@keyframes pulse-dot {
  0%,100% { opacity:1; transform:scale(1); }
  50% { opacity:.65; transform:scale(.85); }
}

.p-icon-wrap {
  width:52px; height:52px; border-radius:14px; display:flex; align-items:center; justify-content:center;
  font-size:28px; flex-shrink:0; overflow:hidden;
  background:linear-gradient(145deg, rgba(241,245,249,.8), rgba(248,250,252,.9));
  box-shadow:
    inset 0 1px 2px rgba(255,255,255,.8),
    0 2px 8px rgba(0,0,0,.05);
  transition:transform .25s ease, box-shadow .25s ease;
}
.p-card:hover .p-icon-wrap {
  transform: scale(1.06);
  box-shadow:
    inset 0 1px 2px rgba(255,255,255,.9),
    0 4px 14px rgba(0,0,0,.08);
}
.p-icon-wrap img { width:100%; height:100%; object-fit:contain; border-radius:14px; }
.p-name { font-size:13px; font-weight:600; color:var(--text); text-align:center; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100%; }
.p-arrow { color:#c4cdd8; font-size:10px; transition:transform .25s ease; margin-top:-4px; opacity:.7; }
.p-card.active .p-arrow { transform:rotate(180deg); color:var(--accent); opacity:1; }

/* ── Expand Form Panel ── */
.form-panel {
  display:none;
  margin-top:24px;
  background:rgba(255,255,255,.85);
  border:1.5px solid rgba(226,232,240,.6);
  border-radius:20px;
  padding:32px 36px 36px;
  animation:panelIn .3s cubic-bezier(.4,0,.2,1);
  backdrop-filter:saturate(160%) blur(12px);
  box-shadow:
    0 4px 24px rgba(99,102,241,.08),
    0 1px 3px rgba(0,0,0,.04);
}
.form-panel.open { display:block; }
@keyframes panelIn {
  from{opacity:0; transform:translateY(-12px) scale(.98);}
  to{opacity:1; transform:translateY(0) scale(1);}
}

/* Form fields */
.fg { margin-bottom:20px; }
.fg-label {
  display:block; font-size:13.5px; font-weight:650; color:var(--text); margin-bottom:7px;
  letter-spacing:.2px;
}
.fg-label .req { color:var(--danger); margin-right:2px; }

.f-select, .f-input {
  width:100%; padding:11px 15px; border-radius:var(--radius-sm); border:1.5px solid rgba(226,232,240,.8);
  background:rgba(255,255,255,.9); color:var(--text); font-size:14px; outline:none;
  transition:all .18s ease; font-family:inherit;
  box-shadow:0 1px 3px rgba(0,0,0,.03);
}
.f-select:focus, .f-input:focus {
  border-color:var(--accent);
  box-shadow:0 0 0 4px rgba(99,102,241,.1), 0 1px 3px rgba(0,0,0,.04);
}
.f-input::placeholder { color:#b4bcc8; }

/* API Key row */
.key-row { display:flex; align-items:center; gap:10px; }
.key-row .f-input { flex:1; }
.get-key-link {
  font-size:13px; color:var(--accent); text-decoration:none; white-space:nowrap; cursor:pointer;
  font-weight:600; flex-shrink:0; padding:8px 14px; border-radius:9px;
  transition:all .18s ease;
}
.get-key-link:hover {
  background:rgba(99,102,241,.07);
  text-decoration:none;
}

/* Model dropdown custom list */
.mdl-wrap { position:relative; }
.mdl-list {
  position:absolute; top:100%; left:0; right:0; z-index:50;
  background:#fff; border:1.5px solid rgba(226,232,240,.7); border-radius:12px;
  box-shadow:0 12px 36px rgba(15,23,42,.1), 0 2px 6px rgba(0,0,0,.04);
  max-height:260px; overflow-y:auto; display:none; margin-top:5px;
  backdrop-filter:saturate(140%) blur(10px);
}
.mdl-list.open { display:block; }
.mi {
  padding:11px 16px; cursor:pointer; font-size:14px; transition:background .12s;
  display:flex; align-items:center; justify-content:space-between; color:var(--text);
}
.mi:hover { background:rgba(99,102,241,.05); }
.mi.sel { background:linear-gradient(135deg, rgba(99,102,241,.08), rgba(139,92,246,.06)); color:var(--accent); font-weight:650; }
.mi-custom { border-top:1.5px solid rgba(226,232,240,.5); color:var(--text-secondary) !important; font-size:13px !important; }
.mi-custom span:last-child { font-size:11.5px; color:var(--text-muted); }

/* Custom model area */
.cust-area { padding-top:14px; }
.cust-row { display:flex; align-items:center; gap:8px; margin-bottom:9px; }
.cust-id {
  flex:1; padding:9px 13px; border:1.5px solid rgba(226,232,240,.7); border-radius:var(--radius-sm);
  font-size:13.5px; outline:none; background:rgba(255,255,255,.85); color:var(--text);
  font-family:inherit; transition:all .18s ease;
}
.cust-id:focus { border-color:var(--accent); box-shadow:0 0 0 4px rgba(99,102,241,.08); background:#fff; }
.cust-name {
  width:145px; flex:0 0 145px; padding:9px 13px; border:1.5px solid rgba(226,232,240,.7); border-radius:var(--radius-sm);
  font-size:13px; outline:none; background:rgba(255,255,255,.85); color:var(--text);
  font-family:inherit;
}
.cust-name::placeholder { color:#b4bcc8; }
.char-cnt { font-size:11.5px; color:var(--text-muted); white-space:nowrap; font-weight:500; }
.add-model-btn {
  padding:6px 14px; border:1.5px dashed var(--accent); border-radius:9px; background:none;
  color:var(--accent); font-size:12.5px; cursor:pointer; transition:all .2s ease; white-space:nowrap;
  font-weight:600; letter-spacing:.2px;
}
.add-model-btn:hover { background:rgba(99,102,241,.06); border-style:solid; transform:translateY(-1px); }
.del-row-btn {
  width:30px; height:30px; border-radius:8px; border:1.5px solid transparent; background:none;
  color:var(--text-muted); cursor:pointer; font-size:15px; display:flex; align-items:center; justify-content:center;
  transition:all .18s ease; flex-shrink:0;
}
.del-row-btn:hover { border-color:var(--danger); color:var(--danger); background:rgba(244,63,94,.05); }

/* Advanced toggle */
.adv-tog {
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 4px; cursor:pointer; user-select:none; font-size:14px; font-weight:650;
  color:var(--text-secondary); margin-top:6px; border-radius:10px;
  transition:background .15s;
}
.adv-tog:hover { color:var(--text); background:rgba(99,102,241,.03); }
.adv-arrow { transition:transform .25s ease; font-size:11px; }
.adv-tog.open .adv-arrow { transform:rotate(180deg); }
.adv-body { display:none; padding-top:6px; animation:advIn .2s ease; }
.adv-body.open { display:block; }
@keyframes advIn { from{opacity:0; transform:translateY(-4px);} to{opacity:1; transform:translateY(0);} }
.af { margin-bottom:16px; }
.af:last-child { margin-bottom:0; }
.af label { display:block; font-size:12.5px; color:var(--text-secondary); margin-bottom:5px; font-weight:500; }
.af .f-input { font-size:13px; padding:10px 13px; }
.radio-gp { display:flex; gap:20px; align-items:center; }
.radio-item { display:flex; align-items:center; gap:7px; cursor:pointer; font-size:13px; color:var(--text); font-weight:500; transition:color .15s; }
.radio-item:hover { color:var(--text); }
.radio-item input[type="radio"] { accent-color:var(--accent); width:17px; height:17px; }

/* Buttons */
.btn-bar {
  display:flex; justify-content:flex-end; gap:12px; margin-top:26px; padding-top:20px;
  border-top:1.5px solid rgba(226,232,240,.5);
}
.btn-cancel {
  padding:10px 26px; border-radius:11px; border:1.5px solid rgba(226,232,240,.7);
  background:rgba(248,250,252,.9); color:var(--text-secondary); font-size:13px; font-weight:600;
  cursor:pointer; transition:all .18s ease;
}
.btn-cancel:hover { background:rgba(241,245,249,1); color:var(--text); border-color:rgba(203,213,225,.7); }
.btn-submit {
  padding:10px 30px; border-radius:11px; border:none;
  background:linear-gradient(135deg, var(--accent), var(--accent-2));
  color:#fff; font-size:13px; font-weight:700; cursor:pointer;
  transition:all .22s cubic-bezier(.4,0,.2,1);
  letter-spacing:.3px;
  box-shadow:0 2px 10px rgba(99,102,24,.25);
}
.btn-submit:hover {
  transform:translateY(-2px);
  box-shadow:0 6px 22px rgba(99,102,241,.35);
  filter:brightness(1.04);
}
.btn-submit:active { transform:scale(.97) translateY(0); }
.btn-submit:disabled { opacity:.45; cursor:not-allowed; transform:none; box-shadow:none; filter:none; }

/* Toast */
.toast {
  position:fixed; bottom:28px; right:28px; padding:14px 24px; border-radius:14px;
  background:#1a1f36; color:#fff; font-size:13.5px; font-weight:500;
  box-shadow:0 12px 36px rgba(15,23,42,.25), 0 2px 6px rgba(0,0,0,.08);
  z-index:9999;
  transform:translateY(120%); opacity:0; transition:all .3s cubic-bezier(.4,0,.2,1);
}
.toast.show { transform:translateY(0); opacity:1; }
.toast.ok { border-left:4px solid var(--success); }
.toast.err { border-left:4px solid var(--danger); }

/* Scrollbar */
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:#c8cfd9; border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:#a8b3c2; }

/* Responsive */
@media(max-width:640px){
  .page-wrap { padding:18px 14px 60px; max-width:100%; }
  .top-nav { padding:0 14px; }
  .page-title { font-size:23px; }
  .p-grid { grid-template-columns: repeat(auto-fill, minmax(148px, 1fr)); gap:11px; }
  .p-card { padding:20px 12px 17px; border-radius:15px; }
  .p-icon-wrap { width:44px; height:44px; font-size:24px; border-radius:12px; }
  .form-panel { padding:22px 18px 26px; margin-top:16px; border-radius:16px; }
  .btn-bar { flex-direction:column-reverse; gap:10px; }
  .btn-submit,.btn-cancel { width:100%; text-align:center; padding:11px 18px; }
  .key-row { flex-direction:column; align-items:stretch; }
  .get-key-link { text-align:left; padding:8px 0; margin-top:4px; display:block; }
}
@media(min-width:900px){
  .p-grid { grid-template-columns: repeat(4, 1fr); }
}
@media(min-width:1200px){
  .p-grid { grid-template-columns: repeat(5, 1fr); }
}
</style>
</head>
<body>

<div class="top-nav">
  <a href="/home" class="nav-brand"><span class="logo">AIManagePlatform</span><span class="nav-tag">v1.0</span></a>
  <div class="nav-spacer"></div>
  <a href="/home" class="nav-link">← 返回主页</a>
</div>

<div class="page-wrap">
  <div class="page-header">
    <div class="page-title">连接模型</div>
    <div class="page-desc">添加你的 API Key 以连接到 AI 提供商，开始使用大模型</div>
  </div>

  <!-- Provider Accordion Grid -->
  <div class="p-grid" id="pGrid"></div>

  <!-- Expand Form Panel -->
  <div class="form-panel" id="formPanel"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════
var PRESETS = [];
var savedKeys = [];
var activeCode = null;
var editId = null;

function hdr() {
  try { var t = localStorage.getItem('access_token');
    if (!t) return {'Content-Type':'application/json'};
    return {'Authorization':'Bearer '+t, 'Content-Type':'application/json'};
  } catch(e) { return {'Content-Type':'application/json'}; }
}

function toast(msg, type) {
  type = type || 'ok';
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + type;
  setTimeout(function(){ el.classList.remove('show'); }, 3000);
}
function esc(s) { var d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }

function findKey(code) {
  for (var i=0;i<savedKeys.length;i++) if(savedKeys[i].provider_code===code) return savedKeys[i];
  return null;
}

// ── Init ──
(async function init() {
  try {
    // meta 是公开接口，不需要认证
    var r = await fetch('/api/provider-keys/meta');
    if (!r.ok) throw new Error('HTTP '+r.status);
    var m = await r.json();
    PRESETS = m.presets || [];

    if (!PRESETS.length) {
      document.getElementById('pGrid').innerHTML =
        '<div style="padding:36px;text-align:center;color:var(--text-muted)">暂无可用模型提供商</div>';
      return;
    }
    await loadKeys();
  } catch(e) {
    console.error('[init]', e.message);
    document.getElementById('pGrid').innerHTML =
      '<div style="padding:36px;text-align:center;color:var(--text-muted)">'+
      '<p style="font-size:15px;margin-bottom:8px">⚠️ 无法加载模型列表</p>'+
      '<p style="font-size:12.5px">'+esc(e.message)+'</p>'+
      '<button class="btn-submit" style="margin-top:14px;padding:8px 20px;font-size:12.5px" onclick="location.reload()">重新加载</button></div>';
  }
})();

async function loadKeys() {
  try {
    var r = await fetch('/api/provider-keys', {headers:hdr()});
    if (r.status===401) { savedKeys=[]; render(); return; }
    if (!r.ok) throw new Error('HTTP '+r.status);
    var d = await r.json();
    savedKeys = d.keys || [];
  } catch(e) { console.warn('[load]', e.message); savedKeys=[]; }
  render();
}

// ── Render Provider List ──
function render() {
  var g = document.getElementById('pGrid');
  // 只显示 LLM 分类
  var llms = PRESETS.filter(function(p){return p.category==='llm';});

  var h = '';
  llms.forEach(function(p){
    var k = findKey(p.code);
    h += '<div class="p-card'+(activeCode===p.code?' active':'')+(k?' has-key':'')+
      '" data-code="'+esc(p.code)+'" onclick="toggleP(\''+p.code+'\')">'+
      '<div class="p-icon-wrap" style="background:'+((p.color||'#e5e7eb')+'10')+'">'+
        esc(p.icon||'🤖') +
      '</div>'+
      '<span class="p-name">'+esc(p.name)+'</span>'+
      '<span class="p-arrow">∨</span>'+
    '</div>';
  });
  g.innerHTML = h;
}

// ── Toggle Expand/Collapse ──
function toggleP(code) {
  if (activeCode === code) { closePanel(); return; }
  activeCode = code;
  editId = null;
  render();
  renderForm(code);
  document.getElementById('formPanel').classList.add('open');
}

function closePanel() {
  activeCode=null; editId=null;
  document.getElementById('formPanel').classList.remove('open');
  document.getElementById('formPanel').innerHTML='';
  render();
}

// ── Render Form Panel ──
function renderForm(code) {
  var preset = null;
  for(var i=0;i<PRESETS.length;i++){if(PRESETS[i].code===code){preset=PRESETS[i];break;}}
  if(!preset) return;

  var key = findKey(code);
  editId = key ? key.id : null;
  var models = preset.models || [];

  var p = document.getElementById('formPanel');

  p.innerHTML =
    /* 模型选择器 */
    '<div class="fg">'+
      '<label class="fg-label"><span class="req">*</span> 模型</label>'+
      '<div class="mdl-wrap">'+
        '<select class="f-select" id="modelSel" onchange="onModelSel(this,\''+code+'\')">'+
          '<option value="">选择模型</option>'+
          models.map(function(m){
            var sel = key && key.models && key.models.indexOf(m)>=0;
            return '<option value="'+esc(m)+'"'+(sel?' selected':'')+'>'+esc(m)+'</option>';
          }).join('')+
          '<option value="__cust__">自定义模型</option>'+
        '</select>'+
        '<div class="mdl-list" id="mdlList">'+
          models.map(function(m){
            var sel = key && key.models && key.models.indexOf(m)>=0;
            return '<div class="mi'+(sel?' sel':'')+'" data-v="'+esc(m)+'" onclick="pickM(this,\''+code+'\')">'+
              '<span>'+esc(m)+'</span>'+(sel?' ✓':'')+
            '</div>';
          }).join('')+
          '<div class="mi mi-custom" data-v="__cust__" onclick="pickCust(this,\''+code+'\')">'+
            '<span>使用其他模型</span><span>配置自定义模型 ID 使用非列表内模型</span>'+
          '</div>'+
        '</div>'+
        '<div class="cust-area" id="custArea" style="display:none">'+
          renderCustRows(key ? (key.models||[]) : [], code)+
        '</div>'+
      '</div>'+
    '</div>'+

    /* API 密钥 */
    '<div class="fg">'+
      '<label class="fg-label"><span class="req">*</span> API 密钥</label>'+
      '<div class="key-row">'+
        '<input type="password" class="f-input" id="apiKeyIn" placeholder="输入 API 密钥" value="" '+
          'onkeydown="if(event.key===\'Enter\')doSubmit(\''+code+'\')">'+
        '<a class="get-key-link" href="#" onclick="return false;">获取 API 密钥</a>'+
      '</div>'+
    '</div>'+

    /* 高级配置 */
    '<div class="adv-tog" id="advTog" onclick="togAdv()">'+
      '<span>高级配置</span><span class="adv-arrow">∨</span>'+
    '</div>'+
    '<div class="adv-body" id="advBody">'+
      '<div class="af"><label>上下文窗口-输入</label>'+
        '<input class="f-input" id="ctxIn" placeholder="为空，系统则默认使用最优配置"></div>'+
      '<div class="af"><label>上下文窗口-输出</label>'+
        '<input class="f-input" id="ctxOut" placeholder="为空，系统则默认使用最优配置"></div>'+
      '<div class="af"><label>工具调用轮次</label>'+
        '<input class="f-input" id="toolRounds" placeholder="为空，系统则默认使用最优配置"></div>'+
      '<div class="af"><label>支持多模态</label>'+
        '<div class="radio-gp">'+
          '<label class="radio-item"><input type="radio" name="mm_'+code+'" value="0" checked> 不支持</label>'+
          '<label class="radio-item"><input type="radio" name="mm_'+code+'" value="1"> 支持</label>'+
        '</div></div>'+
    '</div>'+

    /* 按钮 */
    '<div class="btn-bar">'+
      '<button class="btn-cancel" onclick="closePanel()">取消</button>'+
      '<button class="btn-submit" id="subBtn" onclick="doSubmit(\''+code+'\')">提交</button>'+
    '</div>';

  // 编辑模式回填
  if(key){
    document.getElementById('apiKeyIn').placeholder = key.key_masked || '输入新的 API 密钥（留空不修改）';
    try{
      var c = JSON.parse(key.description||'{}');
      if(c.ctx_input) document.getElementById('ctxIn').value=c.ctx_input;
      if(c.ctx_output) document.getElementById('ctxOut').value=c.ctx_output;
      if(c.tool_rounds) document.getElementById('toolRounds').value=c.tool_rounds;
      if(c.multimodal){
        var rs=document.getElementsByName('mm_'+code);
        for(var ri=0;ri<rs.length;ri++){if(rs[ri].value==='1'&&(c.multimodal===true||c.multimodal==='true'))rs[ri].checked=true;}
      }
    }catch(e){}
  }
}

function renderCustRow(existingModels, code) {
  var presetModels=[];
  var pp=null;
  for(var i=0;i<PRESETS.length;i++){if(PRESETS[i].code===code){pp=PRESETS[i];break;}}
  if(pp&&Array.isArray(pp.models)) presetModels=pp.models.slice();

  var cust=[];
  if(Array.isArray(existingModels)){
    existingModels.forEach(function(m){if(presetModels.indexOf(m)===-1) cust.push({id:m,name:''});});
  }
  if(!cust.length) cust.push({id:'',name:''});

  var h='<div id="custList">';
  cust.forEach(function(cm,idx){
    h+='<div class="cust-row" data-idx="'+idx+'">'+
      '<input class="cust-id" type="text" placeholder="模型 ID" maxlength="32" value="'+esc(cm.id)+'" oninput="updCnt(this)">'+
      '<span class="char-cnt" id="cc_'+idx+'">'+cm.id.length+'/32</span>'+
      '<input class="cust-name" type="text" placeholder="Optional display name" value="'+esc(cm.name)+'">'+
      (cust.length>1 ? '<button class="del-row-btn" onclick="delRow(this,'+idx+',\''+code+'\')">🗑</button>' : '')+
    '</div>';
  });
  h+='</div>';
  h+='<div style="padding:4px 0;display:flex;align-items:center;gap:8px">'+
    '<button class="add-model-btn" onclick="addRow(\''+code+'\')">＋ Add Model ID</button>'+
  '</div>';
  return h;
}
renderCustRows = renderCustRow;

// ── Model Dropdown Interactions ──
document.addEventListener('click', function(e){
  if(!e.target.closest('.mdl-wrap')){
    document.querySelectorAll('.mdl-list').forEach(function(l){l.classList.remove('open');});
  }
});

function pickM(item, code){
  var v=item.getAttribute('data-v');
  document.getElementById('modelSel').value=v;
  item.parentElement.querySelectorAll('.mi').forEach(function(i){i.classList.remove('sel');});
  item.classList.add('sel');
  item.parentElement.classList.remove('open');
  document.getElementById('custArea').style.display='none';
}

function pickCust(item, code){
  document.getElementById('modelSel').value='__cust__';
  item.parentElement.querySelectorAll('.mi').forEach(function(i){i.classList.remove('sel');});
  item.classList.add('sel');
  item.parentElement.classList.remove('open');
  document.getElementById('custArea').style.display='block';
}

function onModelSel(sel, code){
  if(sel.value==='__cust__'){
    document.getElementById('custArea').style.display='block';
  } else {
    document.getElementById('custArea').style.display='none';
  }
}

function updCnt(input){
  var row=input.closest('.cust-row');
  var idx=row?row.getAttribute('data-idx'):0;
  var ce=document.getElementById('cc_'+idx);
  if(ce) ce.textContent=input.value.length+'/32';
}

function addRow(code){
  var list=document.getElementById('custList');
  var rows=list.querySelectorAll('.cust-row');
  var idx=rows.length;
  var div=document.createElement('div');
  div.className='cust-row';
  div.setAttribute('data-idx',idx);
  div.innerHTML=
    '<input class="cust-id" type="text" placeholder="模型 ID" maxlength="32" oninput="updCnt(this)">'+
    '<span class="char-cnt" id="cc_'+idx+'">0/32</span>'+
    '<input class="cust-name" type="text" placeholder="Optional display name">'+
    '<button class="del-row-btn" onclick="delRow(this,'+idx+',\''+code+'\')">🗑</button>';
  list.appendChild(div);
}

function delRow(btn,idx,code){
  var row=btn.closest('.cust-row');
  if(row) row.remove();
  var list=document.getElementById('custList');
  var rows=list.querySelectorAll('.cust-row');
  rows.forEach(function(r,i){
    r.setAttribute('data-idx',i);
    var ci=r.querySelector('.cust-id');
    if(ci) updCnt(ci);
    r.querySelectorAll('.char-cnt')[0].setAttribute('id','cc_'+i);
  });
}

// ── Advanced Toggle ──
function togAdv(){
  var t=document.getElementById('advTog'), b=document.getElementById('advBody');
  var o=b.classList.contains('open');
  t.classList.toggle('open',!o); b.classList.toggle('open',!o);
}

// ── Submit ──
async function doSubmit(code){
  var btn=document.getElementById('subBtn');
  btn.disabled=true; btn.textContent='⏳ 提交中...';

  try{
    // 收集模型
    var mv=document.getElementById('modelSel').value;
    var models=[];
    if(mv && mv!=='__cust__'){
      models=[mv];
    } else if(document.getElementById('custArea').style.display!=='none'){
      document.querySelectorAll('#custList .cust-row').forEach(function(row){
        var ins=row.querySelectorAll('.cust-id');
        if(ins.length>=1 && ins[0].value.trim()) models.push(ins[0].value.trim());
      });
    }
    // 合并已有非自定义模型
    var ek=findKey(code);
    if(ek&&ek.models) ek.models.forEach(function(m){if(models.indexOf(m)===-1) models.push(m);});

    // API Key
    var apiKey=document.getElementById('apiKeyIn').value.trim();
    if(!editId&&!apiKey){toast('请输入 API 密钥','err'); btn.disabled=false; btn.textContent='提交'; return;}

    // 高级配置
    var ci=document.getElementById('ctxIn').value.trim();
    var co=document.getElementById('ctxOut').value.trim();
    var tr=document.getElementById('toolRounds').value.trim();
    var mmRad=document.getElementsByName('mm_'+code);
    var mm=false;
    for(var i=0;i<mmRad.length;i++){if(mmRad[i].checked) mm=mmRad[i].value==='1';}

    var adv={};
    if(ci) adv.ctx_input=ci;
    if(co) adv.ctx_output=co;
    if(tr) adv.tool_rounds=tr;
    if(mm) adv.multimodal=true;

    var ps=null;
    for(var pi=0;pi<PRESETS.length;pi++){if(PRESETS[pi].code===code){ps=PRESETS[pi];break;}}

    var body={
      provider_name:ps?ps.name:code,
      provider_code:code,
      category:ps?(ps.category||'llm'):'llm',
      api_url:ps?(ps.url||''):'',
      models:models,
      is_active:true,
      priority:0,
      description:Object.keys(adv).length>0?JSON.stringify(adv):''
    };
    if(apiKey) body.key_value=apiKey;

    var method=editId?'PUT':'POST';
    var url=editId?('/api/provider-keys/'+editId):'/api/provider-keys';

    var r=await fetch(url,{method:method, headers:hdr(), body:JSON.stringify(body)});
    var d=await r.json().catch(function(){return{};});

    if(r.ok){
      toast(d.message||(editId?'更新成功 ✅':'保存成功 ✅'),'ok');
      closePanel();
      await loadKeys();
    } else {
      toast((d.detail||d.message||'操作失败')+' (HTTP '+r.status+')','err');
    }
  } catch(e){
    toast('网络错误：'+e.message,'err');
  } finally {
    btn.disabled=false; btn.textContent='提交';
  }
}
</script>
