<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIManagePlatform - AI 推理对话</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-gradient: linear-gradient(140deg, #0b0822 0%, #1c1648 48%, #121030 100%);
  --glass-bg: rgba(255, 255, 255, 0.05);
  --glass-border: rgba(255, 255, 255, 0.09);
  --primary-gradient: linear-gradient(120deg, #72e0e0, #ffc8dd);
  --text-main: #f4f4f7;
  --text-sub: #a9a9b8;
  --accent-cyan: #87e8e8;
  --accent-pink: #ffc8dd;
  --danger: #ff6b6b;
  --success: #4ade80;
  --warn: #facc15;
}
body {
  font-family: "Segoe UI", PingFang SC, Microsoft YaHei, system-ui, sans-serif;
  background: var(--bg-gradient);
  min-height: 100vh;
  color: var(--text-main);
  padding: 16px;
}
.top-nav {
  max-width: 1500px;
  margin: 0 auto 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 24px;
  border-radius: 16px;
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  backdrop-filter: blur(24px);
}
.nav-title {
  display: flex;
  align-items: center;
  gap: 12px;
}
.nav-title h1 {
  font-size: 22px;
  background: var(--primary-gradient);
  -webkit-background-clip: text;
  color: transparent;
}
.nav-tag {
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 6px;
  background: rgba(114, 224, 224, 0.12);
  color: var(--accent-cyan);
}
.nav-actions {
  display: flex;
  gap: 10px;
}
.btn {
  padding: 10px 16px;
  border-radius: 10px;
  border: none;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  font-size: 13px;
}
.btn-secondary {
  background: rgba(255,255,255,0.08);
  color: var(--text-main);
}
.btn-secondary:hover { background: rgba(255,255,255,0.14); }
.wrapper {
  max-width: 1500px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 380px 1fr;
  gap: 16px;
  height: calc(100vh - 120px);
}
.panel {
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  backdrop-filter: blur(24px);
  box-shadow: 0 10px 40px rgba(0,0,0,0.3);
  overflow: hidden;
}
.sidebar-panel {
  display: flex;
  flex-direction: column;
}
.sidebar-scroll {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
}
.sidebar-scroll::-webkit-scrollbar { width: 5px; }
.sidebar-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
.collapse-card {
  margin-bottom: 18px;
  border-radius: 14px;
  background: rgba(0,0,0,0.2);
  border: 1px solid rgba(255,255,255,0.06);
}
.card-header {
  padding: 14px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
}
.card-header h2 {
  font-size: 14px;
  letter-spacing: 0.5px;
  color: var(--text-main);
  font-weight: 600;
}
.card-toggle {
  font-size: 16px;
  color: var(--text-sub);
  transition: transform 0.2s;
}
.card-body {
  padding: 0 16px 16px;
  display: none;
}
.card-body.open { display: block; }

/* 心情卡片网格 */
.mood-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-top: 4px;
}
.mood-card {
  background: rgba(0,0,0,0.2);
  border: 1.5px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  padding: 10px 6px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}
.mood-card:hover {
  background: rgba(255,255,255,0.06);
  transform: translateY(-1px);
  border-color: rgba(255,255,255,0.18);
}
.mood-card.active {
  background: linear-gradient(135deg, rgba(114, 224, 224, 0.18), rgba(255, 200, 221, 0.18));
  border-color: var(--accent-cyan);
  box-shadow: 0 0 12px rgba(114, 224, 224, 0.25);
}
.mood-card.active::before {
  content: "✓";
  position: absolute;
  top: 4px;
  right: 6px;
  font-size: 10px;
  color: var(--accent-cyan);
  font-weight: bold;
}
.mood-emoji {
  font-size: 26px;
  margin-bottom: 4px;
  filter: drop-shadow(0 0 4px rgba(255,255,255,0.15));
}
.mood-name {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-main);
  margin-bottom: 2px;
}
.mood-skill {
  font-size: 9px;
  color: var(--text-sub);
  font-family: monospace;
  opacity: 0.7;
}

.field { margin-bottom: 14px; }
label {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--text-sub);
  margin-bottom: 6px;
}
.badge {
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 4px;
}
.badge-req { background: rgba(255,107,107,0.18); color: #ffb4b4; }
input[type="text"],
textarea,
select {
  width: 100%;
  background: rgba(0,0,0,0.25);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  padding: 10px 12px;
  color: #fff;
  font-size: 13px;
  outline: none;
  transition: all 0.2s;
}
input:focus, textarea:focus, select:focus {
  border-color: var(--accent-cyan);
  box-shadow: 0 0 0 3px rgba(114, 224, 224, 0.12);
}
.row-two {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.slider-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
}
.slider-wrap input[type="range"] { flex: 1; }
.slider-val { min-width: 32px; text-align: right; color: var(--accent-cyan); font-weight: 500; }
.switch-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
}
.switch {
  position: relative;
  width: 40px;
  height: 20px;
}
.switch input { opacity: 0; width: 0; height: 0; }
.slider-switch {
  position: absolute;
  cursor: pointer;
  top:0; left:0; right:0; bottom:0;
  background: rgba(255,255,255,0.1);
  border-radius: 20px;
  transition: .3s;
}
.slider-switch:before {
  position: absolute;
  content: "";
  height: 16px; width:16px;
  left:2px; bottom:2px;
  background: white;
  border-radius: 50%;
  transition: .3s;
}
input:checked + .slider-switch { background: var(--accent-cyan); }
input:checked + .slider-switch:before { transform: translateX(20px); }
.skill-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-top: 8px;
}
.skill-item {
  padding: 10px;
  border-radius: 10px;
  background: rgba(114,224,224,0.08);
  border: 1px solid rgba(114,224,224,0.15);
}
.skill-name { font-weight: 600; font-size: 13px; color: var(--accent-cyan); }
.skill-desc { font-size: 11px; color: var(--text-sub); margin-top:3px; }
.btn-primary {
  background: var(--primary-gradient);
  color: #0a0a1a;
}
.btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(114,224,224,0.25); }
.btn-group { display: flex; gap: 8px; margin-top:10px; }
.btn-full { width: 100%; }
.model-select-wrapper {
  position: relative;
}
.model-select {
  appearance: none;
  width: 100%;
  background: rgba(0,0,0,0.25);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  padding: 10px 32px 10px 14px;
  color: #fff;
  font-size: 13px;
  cursor: pointer;
  outline: none;
  transition: all 0.2s;
}
.model-select:focus {
  border-color: var(--accent-cyan);
  box-shadow: 0 0 0 3px rgba(114, 224, 224, 0.12);
}
.model-select-wrapper::after {
  content: '▼';
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 10px;
  color: var(--text-sub);
  pointer-events: none;
}
button:disabled { opacity: 0.45; cursor: not-allowed; transform: none !important; box-shadow: none !important; }
.chat-panel {
  display: flex;
  flex-direction: column;
}
.chat-header-bar {
  padding: 18px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--glass-border);
}
.chat-title h2 { font-size: 18px; }
.chat-stat { font-size:12px; color: var(--text-sub); }
.status-row { display: flex; align-items: center; gap: 8px; }
.dot {
  width:9px; height:9px; border-radius:50%;
  background: var(--success);
  animation: pulse 2s infinite;
}
.dot.thinking { background: var(--warn); animation: pulse 0.8s infinite; }
@keyframes pulse {
  0%,100% { opacity:1; }
  50% { opacity:0.35; }
}
.msg-container {
  flex:1;
  padding: 20px 24px;
  overflow-y: auto;
}
.msg-container::-webkit-scrollbar { width:5px; }
.msg-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius:4px; }
.load-more-container {
  text-align: center;
  padding: 12px;
  margin-bottom: 12px;
}
.load-more-btn {
  background: rgba(114, 224, 224, 0.15);
  border: 1px solid rgba(114, 224, 224, 0.3);
  border-radius: 10px;
  padding: 10px 20px;
  color: var(--accent-cyan);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
}
.load-more-btn:hover {
  background: rgba(114, 224, 224, 0.25);
  border-color: var(--accent-cyan);
}
.load-more-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
.msg-block { margin-bottom: 20px; animation: slideUp 0.3s ease; }
@keyframes slideUp {
  from { opacity:0; transform: translateY(10px); }
  to { opacity:1; transform: translateY(0); }
}
.msg-head {
  display: flex;
  justify-content: space-between;
  margin-bottom: 6px;
  padding: 0 4px;
}
.msg-role { font-size:12px; font-weight:600; letter-spacing:0.5px; }
.msg-time { font-size:10px; color: var(--text-sub); opacity:0.7; }
.msg-del { font-size:11px; color: var(--danger); cursor:pointer; opacity:0; transition:0.2s; }
.msg-block:hover .msg-del { opacity:0.8; }
.bubble {
  padding:14px 18px;
  border-radius:14px;
  line-height:1.7;
  font-size:14px;
  white-space: pre-wrap;
  word-wrap: break-word;
  position: relative;
}
.msg-user .msg-role { color: var(--accent-cyan); }
.msg-user .bubble {
  background: linear-gradient(135deg, rgba(114,224,224,0.12), rgba(114,224,224,0.05));
  border: 1px solid rgba(114,224,224,0.2);
}
.msg-assist .msg-role { color: var(--accent-pink); }
.msg-assist .bubble {
  background: rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.09);
}
.msg-error .bubble {
  background: rgba(255,107,107,0.12);
  border:1px solid rgba(255,107,107,0.2);
  color: #ffc2c2;
}
.input-footer {
  padding:18px 24px;
  border-top:1px solid var(--glass-border);
}
.input-row {
  display: flex;
  gap:12px;
  align-items: flex-end;
}
#userInput {
  flex:1;
  min-height: 72px;
  max-height: 220px;
  resize: vertical;
}
.cursor {
  display: inline-block;
  width:2px; height:17px;
  background: var(--accent-cyan);
  margin-left:3px;
  animation: blink 1s infinite;
  vertical-align: text-bottom;
}
@keyframes blink {
  0%,50% { opacity:1; }
  51%,100% { opacity:0; }
}
.toast {
  position: fixed;
  bottom:24px; right:24px;
  padding:12px 18px;
  border-radius:10px;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(10px);
  border:1px solid rgba(255,255,255,0.1);
  z-index:999;
  font-size:13px;
  transform: translateY(120px);
  opacity:0;
  transition: all 0.3s;
}
.toast.show { transform: translateY(0); opacity:1; }
@media(max-width: 1080px) {
  .wrapper { grid-template-columns: 1fr; height: auto; gap:16px; }
  .sidebar-panel { max-height: 500px; }
}
@media(max-width: 640px) {
  .top-nav { flex-direction: column; gap:12px; align-items: flex-start; }
  .row-two { grid-template-columns: 1fr; }
  .input-row { flex-direction: column; }
  .input-row button { width:100%; }
}
</style>
</head>
<body>
<div class="top-nav">
  <div class="nav-title">
    <h1>AIManagePlatform</h1>
    <span class="nav-tag">AI 推理对话</span>
  </div>
  <div class="nav-actions">
    <button class="btn btn-secondary" onclick="window.location.href='/home'">返回首页</button>
    <button class="btn btn-secondary" onclick="exportChat()">导出对话</button>
    <button class="btn btn-secondary" onclick="clearAllChat()">清空全部</button>
  </div>
</div>

<div class="wrapper">
  <div class="panel sidebar-panel">
    <div class="sidebar-scroll">
      <div class="collapse-card">
        <div class="card-header" onclick="toggleCard(this)">
          <h2>🖥️ 模型选择</h2>
          <span class="card-toggle">−</span>
        </div>
        <div class="card-body open">
          <div class="model-select-wrapper">
            <select class="model-select" id="modelSelect" onchange="saveModel()">
              <option value="glm-5.1">GLM-5.1</option>
              <option value="glm-4.5-air">GLM-4.5-Air</option>
              <option value="glm-4.6v">GLM-4.6V</option>
              <option value="deepseek-chat">DeepSeek-Chat</option>
              <option value="qwen3-turbo">Qwen3-Turbo</option>
            </select>
          </div>
        </div>
      </div>

      <div class="collapse-card">
        <div class="card-header" onclick="toggleCard(this)">
          <h2>💭 小福宝的心情</h2>
          <span class="card-toggle">−</span>
        </div>
        <div class="card-body open">
          <div class="field">
            <label>选择小福宝的心情</label>
            <div class="mood-grid" id="moodGrid">
              <div class="mood-card" data-mood="happy" onclick="selectMood(this)">
                <div class="mood-emoji">😊</div>
                <div class="mood-name">开心</div>
                <div class="mood-skill">happy_mood</div>
              </div>
              <div class="mood-card" data-mood="cheerful" onclick="selectMood(this)">
                <div class="mood-emoji">😄</div>
                <div class="mood-name">愉快</div>
                <div class="mood-skill">cheerful_mood</div>
              </div>
              <div class="mood-card" data-mood="sad" onclick="selectMood(this)">
                <div class="mood-emoji">😢</div>
                <div class="mood-name">难过</div>
                <div class="mood-skill">sad_mood</div>
              </div>
              <div class="mood-card" data-mood="anger" onclick="selectMood(this)">
                <div class="mood-emoji">😠</div>
                <div class="mood-name">生气</div>
                <div class="mood-skill">anger_mood</div>
              </div>
              <div class="mood-card" data-mood="fear" onclick="selectMood(this)">
                <div class="mood-emoji">😨</div>
                <div class="mood-name">害怕</div>
                <div class="mood-skill">fear_mood</div>
              </div>
              <div class="mood-card" data-mood="disgust" onclick="selectMood(this)">
                <div class="mood-emoji">😒</div>
                <div class="mood-name">厌恶</div>
                <div class="mood-skill">disgust_mood</div>
              </div>
              <div class="mood-card" data-mood="surprise" onclick="selectMood(this)">
                <div class="mood-emoji">😲</div>
                <div class="mood-name">惊讶</div>
                <div class="mood-skill">surprise_mood</div>
              </div>
            </div>

          </div>
        </div>
      </div>

      <div class="btn-group">
        <button class="btn btn-secondary btn-full" onclick="clearAllChat()">清空全部对话</button>
      </div>
    </div>
  </div>

  <div class="panel chat-panel">
    <div class="chat-header-bar">
      <div>
        <h2>实时对话控制台</h2>
        <div class="chat-stat" id="tokenStat">本次输出 Token：0</div>
      </div>
      <div class="status-row">
        <span class="dot" id="statusDot"></span>
        <span id="statusText">就绪空闲</span>
      </div>
    </div>
    <div class="msg-container" id="msgBox">
      <div class="load-more-container" id="loadMoreContainer">
        <button class="load-more-btn" id="loadMoreBtn" onclick="loadMoreHistory()">
          🔄 点击加载更多历史记录
        </button>
      </div>
      <div class="msg-block msg-assist">
        <div class="msg-head">
          <span class="msg-role">AI Assistant</span>
          <span class="msg-time">刚刚</span>
        </div>
        <div class="bubble">你好，欢迎使用 AIManagePlatform 对话控制台！
开始与 AI 进行智能对话吧。</div>
      </div>
    </div>
    <div class="input-footer">
      <div class="input-row">
        <textarea id="userInput" placeholder="输入消息，Enter发送，Shift+Enter换行"></textarea>
        <button class="btn btn-primary" id="sendBtn" onclick="sendMessage()">发送消息</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let chatHistory = [];
let displayedHistory = [];
let currentApiKey = '';
let currentApiUrl = '';
let currentMood = 'happy';
const DEFAULT_API_URL = 'https://open.bigmodel.cn/api/paas/v4/chat/completions';
const BASE_URL = window.location.origin;
const PAGE_SIZE = 20;
let currentPage = 0;

document.addEventListener('DOMContentLoaded', async function() {
  await checkLogin();
});

async function checkLogin() {
  const token = localStorage.getItem('access_token');
  if (!token) {
    alert('请先登录！');
    window.location.href = '/login';
    return;
  }
  
  try {
    const response = await fetch('/auth/me', {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    
    if (!response.ok) throw new Error('未授权');
    const user = await response.json();
    
    await loadUserConfig();
    restoreMood();
    loadChatHistory();
    initNotification();
    
  } catch (error) {
    console.error('登录验证失败:', error);
    localStorage.removeItem('access_token');
    localStorage.removeItem('user_id');
    localStorage.removeItem('username');
    localStorage.removeItem('email');
    alert('登录已过期，请重新登录！');
    window.location.href = '/login';
  }
}

/* ===== API Key 脱敏检测与完整 Key 恢复 =====
 * 后端 GET /auth/config 出于安全返回脱敏值（如 "20ea25...jZeR"），不能直接用于真实请求。
 * 首页 navigateTo() 会把完整 key 同时写入 localStorage('ai_platform_api_key')
 * 和 localStorage('ai_chat_config').key，这里从中恢复完整 key。
 */
function isMaskedKey(key) {
  // mask_api_key() 对长 key 返回 "abcdef...7890"，对短 key 返回 "***"
  return !key || typeof key !== 'string' || key.includes('...') || key === '***';
}

function getFullApiKeyFromStorage() {
  // 来源1：ai_platform_api_key（首页 navigateTo / validateKey 写入）
  var localKey = localStorage.getItem('ai_platform_api_key') || '';
  if (!isMaskedKey(localKey)) return localKey;
  // 来源2：ai_chat_config.key（首页 navigateTo 写入的副本）
  try {
    var cfg = JSON.parse(localStorage.getItem('ai_chat_config') || '{}');
    if (cfg.key && !isMaskedKey(cfg.key)) return cfg.key;
  } catch (e) { /* ignore parse error */ }
  return '';
}

async function loadUserConfig() {
  const token = localStorage.getItem('access_token');
  try {
    const response = await fetch('/auth/config', {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    
    if (response.ok) {
      const userConfig = await response.json();
      
      // 【修复】API Key 优先级：localStorage 完整 key > ai_chat_config.key > 后端脱敏值（仅判断是否已配置）
      // 后端 GET /auth/config 返回 mask_api_key() 脱敏值（如 "20ea25...jZeR"），直接使用会导致鉴权失败。
      const storedFullKey = getFullApiKeyFromStorage();
      if (storedFullKey) {
        currentApiKey = storedFullKey;
      } else if (!isMaskedKey(userConfig.api_key)) {
        currentApiKey = userConfig.api_key;
      } else {
        currentApiKey = '';
      }
      
      currentApiUrl = userConfig.api_url || localStorage.getItem('ai_platform_api_url') || DEFAULT_API_URL;
      currentMood = userConfig.mood || localStorage.getItem('selected_mood') || 'happy';
      
      // 先恢复自定义模型到选择器
      if (userConfig.custom_models && userConfig.custom_models.length > 0) {
        const modelSelect = document.getElementById('modelSelect');
        if (modelSelect) {
          userConfig.custom_models.forEach(model => {
            if (!Array.from(modelSelect.options).some(o => o.value === model.id)) {
              const option = document.createElement('option');
              option.value = model.id;
              option.textContent = model.name;
              modelSelect.appendChild(option);
            }
          });
        }
      }
      
      // 恢复模型：localStorage 优先（主页面同步保存的，最可靠），后端兜底
      const modelToSet = localStorage.getItem('ai_platform_model') || userConfig.default_model || '';
      if (modelToSet) {
        const modelSelect = document.getElementById('modelSelect');
        if (modelSelect) {
          const options = Array.from(modelSelect.options);
          const matchedOption = options.find(o => o.value.toLowerCase() === modelToSet.toLowerCase());
          if (matchedOption) {
            modelSelect.value = matchedOption.value;
          }
        }
      }
      
      // 【修复】只在 currentApiKey 是完整 key（非脱敏）时才写回 localStorage，
      // 避免把脱敏值 "20ea25...jZeR" 污染到 localStorage 覆盖原有完整 key。
      if (currentApiKey && !isMaskedKey(currentApiKey)) {
        localStorage.setItem('ai_platform_api_key', currentApiKey);
      }
      localStorage.setItem('ai_platform_api_url', currentApiUrl);
      localStorage.setItem('selected_mood', currentMood);
    }
  } catch (error) {
    console.error('加载用户配置失败:', error);
    // 【修复】catch 也使用 getFullApiKeyFromStorage()，避免读到被旧 bug 污染的脱敏值
    currentApiKey = getFullApiKeyFromStorage();
    currentApiUrl = localStorage.getItem('ai_platform_api_url') || DEFAULT_API_URL;
    currentMood = localStorage.getItem('selected_mood') || 'happy';
    // 从 localStorage 恢复模型（即使后端请求失败也能正确设置）
    const localModel = localStorage.getItem('ai_platform_model');
    if (localModel) {
      const modelSelect = document.getElementById('modelSelect');
      if (modelSelect) {
        const options = Array.from(modelSelect.options);
        const matchedOption = options.find(o => o.value.toLowerCase() === localModel.toLowerCase());
        if (matchedOption) {
          modelSelect.value = matchedOption.value;
        }
      }
    }
  }
  
  if (!currentApiKey) {
    showToast('请先在首页设置 API Key');
  }
}

async function saveConfigToBackend(configData) {
  const token = localStorage.getItem('access_token');
  if (!token) return;
  try {
    await fetch('/auth/config', {
      method: 'PUT',
      headers: {
        'Authorization': `Bearer ${token}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(configData)
    });
  } catch (e) {
    console.error('保存配置到后端失败:', e);
  }
}

async function saveModel() {
  const model = document.getElementById('modelSelect')?.value;
  if (!model) return;
  localStorage.setItem('ai_platform_model', model);
  await saveConfigToBackend({ default_model: model });
}

async function saveMoodToBackend(mood) {
  currentMood = mood;
  localStorage.setItem('selected_mood', mood);
  await saveConfigToBackend({ mood: mood });
}

async function loadChatHistory() {
  const token = localStorage.getItem('access_token');
  try {
    const res = await fetch('/auth/history?limit=200', {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    const data = await res.json();
    if (Array.isArray(data) && data.length > 0) {
      chatHistory = data;
      currentPage = 0;
      
      if (chatHistory.length <= PAGE_SIZE) {
        displayedHistory = [...chatHistory];
      } else {
        const start = chatHistory.length - PAGE_SIZE;
        displayedHistory = chatHistory.slice(start);
      }
    } else {
      const moodGreetings = {
        'happy': '你好呀！很高兴见到你～今天也是元气满满的一天呢！',
        'cheerful': '嗨！看到你真开心！有什么想聊的吗？',
        'sad': '你好...我知道有时候心情会很低落，如果你愿意，可以和我说说。',
        'anger': '哼！干嘛啦！有话快说！',
        'fear': '你...你好...我有点紧张...',
        'disgust': '哦，是你啊...有什么事？',
        'surprise': '哇！你来了！真没想到会在这里见到你！'
      };
      const greeting = moodGreetings[currentMood] || '你好，欢迎使用 AIManagePlatform 对话控制台！';
      chatHistory = [{ role: 'assistant', content: greeting }];
      displayedHistory = [...chatHistory];
    }
    
    displayHistory();
  } catch (err) {
    console.error('加载聊天历史失败:', err);
  }
}

function loadMoreHistory() {
  const container = document.getElementById('loadMoreContainer');
  const btn = document.getElementById('loadMoreBtn');
  const msgBox = document.getElementById('msgBox');
  
  if (chatHistory.length <= displayedHistory.length) {
    btn.innerHTML = '已加载全部历史记录';
    btn.disabled = true;
    return;
  }
  
  btn.innerHTML = '加载中...';
  btn.disabled = true;
  
  const totalPages = Math.ceil(chatHistory.length / PAGE_SIZE);
  currentPage++;
  
  const previousHeight = msgBox.scrollHeight;
  
  if (currentPage >= totalPages) {
    displayedHistory = [...chatHistory];
    displayHistory(false);
    const newHeight = msgBox.scrollHeight;
    msgBox.scrollTop = newHeight - previousHeight;
    btn.innerHTML = '已加载全部历史记录';
    btn.disabled = true;
    return;
  }
  
  const start = Math.max(0, chatHistory.length - (currentPage + 1) * PAGE_SIZE);
  const end = chatHistory.length - currentPage * PAGE_SIZE;
  const pageData = chatHistory.slice(start, end);
  
  displayedHistory = [...pageData, ...displayedHistory];
  displayHistory(false);
  
  const newHeight = msgBox.scrollHeight;
  msgBox.scrollTop = newHeight - previousHeight;
  
  const remaining = chatHistory.length - displayedHistory.length;
  btn.innerHTML = remaining > 0 ? `向上滑动加载更多 (还剩 ${remaining} 条)` : '已加载全部';
  btn.disabled = remaining <= 0;
}

function displayHistory(scrollToBottom = true) {
  const msgBox = document.getElementById('msgBox');
  const container = document.getElementById('loadMoreContainer');
  const btn = document.getElementById('loadMoreBtn');
  
  msgBox.innerHTML = '';
  
  if (chatHistory.length > displayedHistory.length) {
    btn.innerHTML = `向上滑动加载更多历史记录 (还剩 ${chatHistory.length - displayedHistory.length} 条)`;
    btn.disabled = false;
    container.style.display = 'block';
    msgBox.appendChild(container);
  } else {
    container.style.display = 'none';
  }
  
  displayedHistory.forEach(msg => {
    if (msg.role !== 'system') {
      const time = (msg.created_at ? new Date(msg.created_at) : new Date()).toLocaleTimeString();
      const wrap = document.createElement("div");
      wrap.className = `msg-block ${msg.role === "user" ? "msg-user" : "msg-assist"}`;
      
      const head = document.createElement("div");
      head.className = "msg-head";
      head.innerHTML = `
        <span class="msg-role">${msg.role === "user" ? "You" : "AI Assistant"}</span>
        <div>
          <span class="msg-time">${time}</span>
          <span class="msg-del" onclick="delMsg(this)">删除</span>
        </div>
      `;
      
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = msg.content;
      
      wrap.appendChild(head);
      wrap.appendChild(bubble);
      msgBox.appendChild(wrap);
    }
  });
  
  if (scrollToBottom) {
    msgBox.scrollTop = msgBox.scrollHeight;
  }
  
  setupScrollLoader();
}

function setupScrollLoader() {
  const msgBox = document.getElementById('msgBox');
  msgBox.removeEventListener('scroll', handleScroll);
  msgBox.addEventListener('scroll', handleScroll);
}

let isLoadingInProgress = false;
function handleScroll() {
  const msgBox = document.getElementById('msgBox');
  const container = document.getElementById('loadMoreContainer');
  const btn = document.getElementById('loadMoreBtn');
  
  if (isLoadingInProgress) return;
  if (chatHistory.length <= displayedHistory.length) {
    container.style.display = 'none';
    return;
  }
  
  if (msgBox.scrollTop < 50) {
    isLoadingInProgress = true;
    btn.innerHTML = '加载中...';
    
    setTimeout(() => {
      loadMoreHistory();
      isLoadingInProgress = false;
    }, 300);
  }
}

async function clearAllChat() {
  if (!confirm('确定要清空所有对话历史吗？')) return;
  const token = localStorage.getItem('access_token');
  chatHistory = [];
  displayedHistory = [];
  try {
    await fetch('/auth/history', {
      method: 'DELETE',
      headers: { 'Authorization': `Bearer ${token}` }
    });
  } catch (err) {
    console.error('清空历史失败:', err);
  }
  displayHistory();
  showToast('聊天记录已清空');
}

function toggleCard(el) {
  const body = el.nextElementSibling;
  const icon = el.querySelector(".card-toggle");
  body.classList.toggle("open");
  icon.textContent = body.classList.contains("open") ? "−" : "+";
}

function showToast(text) {
  const toast = document.getElementById("toast");
  toast.textContent = text;
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 2200);
}

function setStatus(isThinking, text) {
  const dot = document.getElementById("statusDot");
  const t = document.getElementById("statusText");
  dot.className = "dot" + (isThinking ? " thinking" : "");
  t.textContent = text;
}

function updateTokenStat(prompt, comp) {
  document.getElementById("tokenStat").textContent =
    `本次输出 Token：${comp}`;
}

function addMessage(role, content, time = null, isError = false) {
  const box = document.getElementById("msgBox");
  const wrap = document.createElement("div");
  wrap.className = `msg-block ${role === "user" ? "msg-user" : isError ? "msg-error" : "msg-assist"}`;
  const now = time || new Date().toLocaleTimeString();

  const head = document.createElement("div");
  head.className = "msg-head";
  head.innerHTML = `
    <span class="msg-role">${role === "user" ? "You" : isError ? "错误" : "AI Assistant"}</span>
    <div>
      <span class="msg-time">${now}</span>
      <span class="msg-del" onclick="delMsg(this)">删除</span>
    </div>
  `;

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.textContent = content;

  wrap.appendChild(head);
  wrap.appendChild(bubble);
  box.appendChild(wrap);
  box.scrollTop = box.scrollHeight;
  return bubble;
}

function delMsg(el) {
  const block = el.closest(".msg-block");
  block.remove();
  showToast("已删除单条消息");
}

function exportChat() {
  let txt = "# AIManagePlatform 对话导出\n";
  document.querySelectorAll(".msg-block").forEach(block => {
    const role = block.querySelector(".msg-role").textContent;
    const text = block.querySelector(".bubble").textContent;
    txt += `\n【${role}】\n${text}\n`;
  });
  const blob = new Blob([txt], { type: "text/plain" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "chat_log.txt";
  a.click();
  showToast("对话日志已导出");
}

document.getElementById("userInput").onkeydown = function(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
};

async function sendMessage() {
  const input = document.getElementById("userInput");
  const text = input.value.trim();
  if (!text) return showToast("请输入对话内容");

  if (!currentApiKey) {
    alert('请先在首页输入 API Key！');
    window.location.href = '/';
    return;
  }

  input.value = "";
  const now = new Date().toLocaleTimeString();
  addMessage("user", text, now);
  chatHistory.push({ role: "user", content: text });

  document.getElementById("tokenStat").textContent = "本次输出 Token：0";

  const sendBtn = document.getElementById("sendBtn");
  sendBtn.disabled = true;
  setStatus(true, "模型思考流式输出中...");

  const bubble = addMessage("assist", "", now);
  const cursor = document.createElement("span");
  cursor.className = "cursor";
  bubble.appendChild(cursor);
  let fullResp = "";

  const skillsConfig = JSON.parse(localStorage.getItem('skills_config') || '{}');
  const enabledTools = ['get_time', 'calculate', 'get_weather'].filter(tool => skillsConfig[tool] !== false);
  
  const savedMood = localStorage.getItem('selected_mood') || currentMood || 'happy';
  currentMood = savedMood;
  
  const MAX_HISTORY_MESSAGES = 20;
  const recentHistory = chatHistory.slice(-MAX_HISTORY_MESSAGES);

  // 从页面模型选择器获取当前模型
  const modelSelect = document.getElementById('modelSelect');
  const selectedModel = modelSelect ? modelSelect.value : (localStorage.getItem('ai_platform_model') || 'glm-4.6v');

  const reqBody = {
    messages: recentHistory,
    api_key: currentApiKey,
    api_url: currentApiUrl,
    model: selectedModel,
    enabled_tools: enabledTools,
    mood: currentMood
  };

  const token = localStorage.getItem('access_token');
  try {
    const res = await fetch(`${BASE_URL}/chat`, {
      method: "POST",
      headers: { 
        "Content-Type": "application/json",
        "Authorization": `Bearer ${token}`
      },
      body: JSON.stringify(reqBody)
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const reader = res.body.getReader();
    const decoder = new TextDecoder("utf-8");

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value, { stream: true });
      const lines = chunk.split("\n");
      for (let line of lines) {
        if (!line.startsWith("data: ")) continue;
        const data = line.slice(6);
        if (data === "[DONE]") continue;
        try {
          const obj = JSON.parse(data);
          if (obj.content) {
            fullResp += obj.content;
            bubble.textContent = fullResp;
            bubble.appendChild(cursor);
            document.getElementById("msgBox").scrollTop = document.getElementById("msgBox").scrollHeight;
          }
          if (obj.tool_result) {
            let toolMsg = `${obj.tool_result.result}`;
            // 仅移除内部调试标记，保留 emoji、中文、标点等用户可见内容
            toolMsg = toolMsg.replace(/工具调用\s*\[.*?\]\s*[:：]?\s*/g, '');
            if (!fullResp) {
              fullResp = toolMsg;
            } else {
              fullResp += "\n\n" + toolMsg;
            }
            bubble.textContent = fullResp;
            bubble.appendChild(cursor);
            document.getElementById("msgBox").scrollTop = document.getElementById("msgBox").scrollHeight;
          }
          if (obj.usage) {
            updateTokenStat(obj.usage.prompt_tokens || 0, obj.usage.completion_tokens || 0);
          }
        } catch (err) {}
      }
    }
    cursor.remove();
    chatHistory.push({ role: "assistant", content: fullResp });
    setStatus(false, "就绪空闲");
  } catch (err) {
    bubble.remove();
    addMessage("assist", `请求异常：${err.message}`, now, true);
    setStatus(false, "连接错误");
    showToast("接口请求失败");
  }
  sendBtn.disabled = false;
}

function initNotification() {
  if (!window.EventSource) {
    console.log("浏览器不支持 SSE");
    return;
  }

  const url = `${BASE_URL}/api/notifications`;
  console.log("尝试连接 SSE:", url);
  
  const eventSource = new EventSource(url, {
    withCredentials: true
  });

  eventSource.onopen = function() {
    console.log("SSE 连接成功！");
    showToast("通知已连接", 'success');
  };

  eventSource.onmessage = function(event) {
    console.log("收到 SSE 消息:", event.data);
    try {
      const data = JSON.parse(event.data);
      if (data.type === 'reminder') {
        const now = new Date();
        const timeStr = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
        addMessage("assist", `⏰ 提醒！${data.message}`, timeStr, false);
        showToast(`提醒：${data.message}`, 'success');
      }
    } catch (e) {
      console.error("解析通知失败", e);
    }
  };

  eventSource.onerror = function(e) {
    console.error("SSE 连接错误:", e);
    if (eventSource.readyState === EventSource.CLOSED) {
      console.log("SSE 连接已关闭，5秒后重试...");
      setTimeout(initNotification, 5000);
    } else {
      console.log("SSE 连接异常");
    }
  };

  console.log("SSE EventSource 创建完成，等待连接...");
}

async function selectMood(cardEl) {
  const mood = cardEl.dataset.mood;
  if (!mood) return;

  const prevMood = currentMood || 'happy';
  if (prevMood === mood) return;

  document.querySelectorAll('.mood-card').forEach(c => c.classList.remove('active'));
  cardEl.classList.add('active');

  currentMood = mood;
  await saveMoodToBackend(mood);

  const moodLabel = {
    'happy': '开心', 'cheerful': '愉快', 'sad': '难过',
    'anger': '生气', 'fear': '害怕', 'disgust': '厌恶', 'surprise': '惊讶'
  }[mood] || mood;
  const emojiMap = {
    'happy': '', 'cheerful': '', 'sad': '',
    'anger': '', 'fear': '', 'disgust': '', 'surprise': ''
  };
  const emoji = emojiMap[mood] || '';

  addMessage('assist', `${emoji} 心情已切换为【${moodLabel}】，后续回复将以该语气进行`, new Date().toTimeString().slice(0, 5), false);
}

function restoreMood() {
  const savedMood = localStorage.getItem('selected_mood') || currentMood || 'happy';
  currentMood = savedMood;
  
  document.querySelectorAll('.mood-card').forEach(c => {
    if (c.dataset.mood === savedMood) {
      c.classList.add('active');
    } else {
      c.classList.remove('active');
    }
  });
}
